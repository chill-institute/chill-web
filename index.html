<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Search trackers, filter results fast, and send downloads to put.io with chill.institute."
    />
    <meta name="application-name" content="chill.institute" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="chill.institute" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="theme-color" content="#d6d3d1" />
    <style>
      html {
        background: #d6d3d1;
        color-scheme: light;
      }

      html.dark {
        background: #292524;
        color-scheme: dark;
      }

      body {
        background: inherit;
      }
    </style>
    <script>
      (() => {
        const storageKey = "chill.theme";
        const lightColor = "#d6d3d1";
        const darkColor = "#292524";
        const storedTheme = window.localStorage.getItem(storageKey);
        const theme =
          storedTheme === "light" || storedTheme === "dark" || storedTheme === "system"
            ? storedTheme
            : "system";
        const systemDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
        const isDark = theme === "dark" || (theme === "system" && systemDark);
        const color = isDark ? darkColor : lightColor;
        const root = document.documentElement;
        root.classList.toggle("dark", isDark);
        root.style.colorScheme = isDark ? "dark" : "light";
        root.style.backgroundColor = color;
        document.querySelector('meta[name="theme-color"]')?.setAttribute("content", color);
      })();
    </script>
    <meta property="og:title" content="chill.institute" />
    <meta
      property="og:description"
      content="Search trackers, filter results fast, and send downloads to put.io with chill.institute."
    />
    <meta property="og:site_name" content="chill.institute" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://chill.institute/" />
    <meta property="og:image" content="/opengraph-image.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="chill.institute" />
    <meta
      name="twitter:description"
      content="Search trackers, filter results fast, and send downloads to put.io with chill.institute."
    />
    <meta name="twitter:site" content="@chill_institute" />
    <meta name="twitter:image" content="/twitter-image.png" />
    <link rel="canonical" href="https://chill.institute/" />
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.json" />
    <link
      rel="preload"
      href="/fonts/metric/metric-regular.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />
    <link
      rel="preload"
      href="/fonts/metric/metric-medium.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />
    <link
      rel="preload"
      href="/fonts/family/family-regular.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />
    <title>chill.institute | Search and send to put.io</title>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
