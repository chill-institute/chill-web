[tools]
bun = "1.3.9"

[tasks.install]
description = "Install web dependencies"
run = "bun install --frozen-lockfile"

[tasks.typecheck]
description = "Run TypeScript checks"
depends = ["install"]
run = "bun run typecheck"

[tasks.lint]
description = "Run formatting and lint checks"
depends = ["install"]
run = "bun run check"

[tasks.build]
description = "Build the web app"
depends = ["install"]
run = "bun run build"

[tasks.test]
description = "Run Playwright tests"
depends = ["build"]
run = "bun run test"

[tasks.verify]
description = "Run the standalone web verification baseline"
depends = ["typecheck", "lint", "build", "test"]
