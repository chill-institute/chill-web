[tools]
node = "24.14.0"
pnpm = "10.15.1"

[tasks.install]
description = "Install web dependencies"
run = "vp install --frozen-lockfile"

[tasks.check]
description = "Run Vite+ format, lint, and type checks"
depends = ["install"]
run = "vp check"

[tasks.build]
description = "Build the web app"
depends = ["install"]
run = "vp build"

[tasks.test]
description = "Run Playwright tests"
run = "vp run e2e"

[tasks.verify]
description = "Run the standalone web verification baseline"
depends = ["install"]
run = '''
vp check
vp build
vp run e2e
'''
