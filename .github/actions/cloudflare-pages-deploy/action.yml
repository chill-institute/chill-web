name: Cloudflare Pages Deploy
description: Deploy a prepared static bundle to Cloudflare Pages without GitHub comment integration

inputs:
  api-token:
    description: Cloudflare API token with Pages deploy access
    required: true
  account-id:
    description: Cloudflare account ID
    required: true
  branch:
    description: Cloudflare Pages branch to deploy
    required: true
  dist-dir:
    description: Static bundle directory
    required: false
    default: dist
  project-name:
    description: Cloudflare Pages project name
    required: false
    default: web-8vr

outputs:
  command-output:
    description: Wrangler command stdout
    value: ${{ steps.deploy.outputs.command-output }}
  deployment-url:
    description: Cloudflare deployment URL
    value: ${{ steps.deploy.outputs.deployment-url }}
  pages-deployment-alias-url:
    description: Cloudflare Pages alias URL
    value: ${{ steps.deploy.outputs.pages-deployment-alias-url }}
  pages-deployment-id:
    description: Cloudflare Pages deployment ID
    value: ${{ steps.deploy.outputs.pages-deployment-id }}
  pages-environment:
    description: Cloudflare Pages environment
    value: ${{ steps.deploy.outputs.pages-environment }}

runs:
  using: composite
  steps:
    - name: Deploy to Cloudflare Pages
      id: deploy
      uses: cloudflare/wrangler-action@v3
      with:
        apiToken: ${{ inputs.api-token }}
        accountId: ${{ inputs.account-id }}
        command: pages deploy ${{ inputs.dist-dir }} --project-name ${{ inputs.project-name }} --branch ${{ inputs.branch }}
        packageManager: pnpm
        gitHubToken: ""
