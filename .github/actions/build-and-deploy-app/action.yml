name: Build and Deploy App
description: Build the app bundle, upload source maps, restore SST state, and deploy.

inputs:
  environment-name:
    description: GitHub Environment name and SST stage to deploy through.
    required: true

runs:
  using: composite
  steps:
    - name: Read Vite+ version
      id: vite_plus
      shell: bash
      run: |
        set -euo pipefail

        version="$(jq -er '(.devDependencies["vite-plus"] // .dependencies["vite-plus"]) | sub("^[~^]"; "")' package.json)"
        echo "version=${version}" >> "${GITHUB_OUTPUT}"

    - name: Set up Vite+
      uses: voidzero-dev/setup-vp@2dec1e33f4ab2c6d5bce1b0c4607961bb1a3f7a1 # v1.12.0
      with:
        version: ${{ steps.vite_plus.outputs.version }}
        node-version-file: ".node-version"
        cache: "false"
        run-install: "true"

    - name: Load Vite+ environment
      shell: bash
      run: vp env

    - name: Stamp deployed release
      shell: bash
      run: echo "VITE_PUBLIC_RELEASE=$(git rev-parse --short HEAD)" >> "${GITHUB_ENV}"

    - name: Build app bundle
      shell: bash
      run: vp run build

    - name: Install age
      shell: bash
      run: scripts/ci/install-age

    - name: Restore encrypted SST local state
      shell: bash
      run: scripts/ci/sst-state-git restore

    - name: Deploy app to SST
      shell: bash
      env:
        SST_STAGE: ${{ inputs.environment-name }}
      run: vp exec sst deploy --stage "${SST_STAGE}" --print-logs

    - name: Save encrypted SST local state
      if: always()
      shell: bash
      run: scripts/ci/sst-state-git save
