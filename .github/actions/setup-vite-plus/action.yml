name: Set up Vite+
description: Set up the repo-pinned Vite+ toolchain.

inputs:
  cache:
    description: Enable Vite+ dependency caching.
    default: "true"
  run-install:
    description: Let setup-vp run vp install.
    default: "true"

runs:
  using: composite
  steps:
    - name: Read Vite+ version
      id: vite_plus
      shell: bash
      run: |
        set -euo pipefail

        version="$(jq -er '(.devDependencies["vite-plus"] // .dependencies["vite-plus"]) | sub("^[~^]"; "")' package.json)"
        echo "version=${version}" >> "${GITHUB_OUTPUT}"

    - name: Set up Vite+
      uses: voidzero-dev/setup-vp@2dec1e33f4ab2c6d5bce1b0c4607961bb1a3f7a1 # v1.12.0
      with:
        version: ${{ steps.vite_plus.outputs.version }}
        node-version-file: ".node-version"
        cache: ${{ inputs.cache }}
        run-install: ${{ inputs.run-install }}

    - name: Load Vite+ environment
      shell: bash
      run: vp env
