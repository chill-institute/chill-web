name: Deploy Staging

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Same-repo branch or full commit SHA to deploy
        required: true
        type: string
      target:
        description: Deployment target
        required: true
        default: all
        type: choice
        options:
          - all
          - app
          - zones
env:
  BINGE_PRODUCTION_DOMAIN: ${{ vars.BINGE_PRODUCTION_DOMAIN }}
  BINGE_PRODUCTION_REDIRECT_DOMAIN: ${{ vars.BINGE_PRODUCTION_REDIRECT_DOMAIN }}
  CHILL_PRODUCTION_DOMAIN: ${{ vars.CHILL_PRODUCTION_DOMAIN }}
  CHILL_STAGING_DOMAIN: ${{ vars.CHILL_STAGING_DOMAIN }}
  SST_STATE_REPO: ${{ vars.SST_STATE_REPO }}
  SST_STATE_REPO_BRANCH: ${{ vars.SST_STATE_REPO_BRANCH }}
  SST_STATE_FILE: ${{ vars.SST_STATE_FILE_STAGING }}
  SST_STATE_AGE_RECIPIENT: ${{ vars.SST_STATE_AGE_RECIPIENT }}

permissions:
  contents: read

concurrency:
  group: web-deploy-staging
  cancel-in-progress: false

jobs:
  workflow-security:
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Scan GitHub Actions security
        uses: zizmorcore/zizmor-action@5f14fd08f7cf1cb1609c1e344975f152c7ee938d # v0.5.6
        with:
          advanced-security: false
          annotations: true
          min-confidence: medium
          min-severity: medium
          version: v1.25.2

  validate:
    runs-on: ubuntu-latest
    outputs:
      ref: ${{ steps.validate.outputs.ref }}
      sha: ${{ steps.validate.outputs.sha }}
      app: ${{ steps.select.outputs.app }}
      zones: ${{ steps.select.outputs.zones }}
    steps:
      - name: Validate ref
        id: validate
        env:
          TARGET: ${{ inputs.target }}
          INPUT_REF: ${{ inputs.ref }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          WORKFLOW_REF: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          if [ "${WORKFLOW_REF}" != "${DEFAULT_BRANCH}" ]; then
            echo "Deploy Staging must be run from ${DEFAULT_BRANCH}; got ${WORKFLOW_REF}" >&2
            exit 1
          fi

          ref="$(printf '%s' "${INPUT_REF}" | tr -d '[:space:]')"
          if [ -z "${ref}" ]; then
            echo "ref is required" >&2
            exit 1
          fi

          case "${ref}" in
            refs/*|pull/*|origin/*|*://*|*..*|*~*|*^*|*:*|*' '*)
              echo "unsupported ref: ${ref}" >&2
              exit 1
              ;;
          esac

          if printf '%s' "${ref}" | grep -Eq '^[0-9a-f]{40}$'; then
            sha="${ref}"
            if ! gh api "repos/${REPOSITORY}/commits/${sha}" --silent; then
              echo "commit SHA not found in ${REPOSITORY}: ${sha}" >&2
              exit 1
            fi
          else
            if ! git check-ref-format --branch "${ref}" >/dev/null 2>&1; then
              echo "invalid branch name: ${ref}" >&2
              exit 1
            fi

            sha="$(gh api "repos/${REPOSITORY}/git/ref/heads/${ref}" --jq '.object.sha')"
            if [ -z "${sha}" ]; then
              echo "branch not found in ${REPOSITORY}: ${ref}" >&2
              exit 1
            fi
          fi

          default_sha="$(gh api "repos/${REPOSITORY}/git/ref/heads/${DEFAULT_BRANCH}" --jq '.object.sha')"
          case "${TARGET}" in
            all|zones)
              if [ "${ref}" != "${DEFAULT_BRANCH}" ] && [ "${sha}" != "${default_sha}" ]; then
                echo "zone deploys must use ${DEFAULT_BRANCH}; got ${ref}" >&2
                exit 1
              fi
              ;;
          esac

          {
            echo "ref=${ref}"
            echo "sha=${sha}"
          } >> "${GITHUB_OUTPUT}"

      - name: Select deployment targets
        id: select
        env:
          TARGET: ${{ inputs.target }}
        run: |
          set -euo pipefail

          case "${TARGET}" in
            all)
              echo "app=true" >> "${GITHUB_OUTPUT}"
              echo "zones=true" >> "${GITHUB_OUTPUT}"
              ;;
            app)
              echo "app=true" >> "${GITHUB_OUTPUT}"
              echo "zones=false" >> "${GITHUB_OUTPUT}"
              ;;
            zones)
              echo "app=false" >> "${GITHUB_OUTPUT}"
              echo "zones=true" >> "${GITHUB_OUTPUT}"
              ;;
            *)
              echo "unsupported target: ${TARGET}" >&2
              exit 1
              ;;
          esac

  verify-app:
    needs: [workflow-security, validate]
    if: ${{ needs.workflow-security.result == 'success' && needs.validate.outputs.app == 'true' }}
    concurrency:
      group: web-staging-verify-app-${{ needs.validate.outputs.sha }}
      cancel-in-progress: true
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ needs.validate.outputs.sha }}

      - name: Read Vite+ version
        id: vite_plus
        run: |
          set -euo pipefail

          version="$(jq -er '(.devDependencies["vite-plus"] // .dependencies["vite-plus"]) | sub("^[~^]"; "")' package.json)"
          echo "version=${version}" >> "${GITHUB_OUTPUT}"

      - name: Set up Vite+
        uses: voidzero-dev/setup-vp@ca1c46663915d6c1042ae23bd39ab85718bfb0fa # v1.10.0
        with:
          version: ${{ steps.vite_plus.outputs.version }}
          node-version-file: ".node-version"
          cache: true
          run-install: false

      - name: Load Vite+ environment
        run: vp env

      - name: Install dependencies
        run: vp install

      - name: Verify app
        run: |
          vp run check
          vp run test
          vp run build

  e2e:
    needs: [validate, verify-app]
    if: ${{ needs.verify-app.result == 'success' }}
    concurrency:
      group: web-staging-e2e-${{ github.run_id }}
      cancel-in-progress: true
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ needs.validate.outputs.sha }}

      - name: Read Vite+ version
        id: vite_plus
        run: |
          set -euo pipefail

          version="$(jq -er '(.devDependencies["vite-plus"] // .dependencies["vite-plus"]) | sub("^[~^]"; "")' package.json)"
          echo "version=${version}" >> "${GITHUB_OUTPUT}"

      - name: Set up Vite+
        uses: voidzero-dev/setup-vp@ca1c46663915d6c1042ae23bd39ab85718bfb0fa # v1.10.0
        with:
          version: ${{ steps.vite_plus.outputs.version }}
          node-version-file: ".node-version"
          cache: true
          run-install: false

      - name: Load Vite+ environment
        run: vp env

      - name: Install dependencies
        run: vp install

      - name: Install Playwright browser
        run: vp exec playwright install chromium

      - name: Build app
        run: vp run build

      - name: Run end-to-end tests
        run: vp run e2e

      - name: Upload Playwright artifacts
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-artifacts
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore

  deploy-app:
    needs: [validate, verify-app, e2e, deploy-zones]
    if: ${{ always() && needs.validate.outputs.app == 'true' && needs.verify-app.result == 'success' && needs.e2e.result == 'success' && (needs.deploy-zones.result == 'success' || needs.deploy-zones.result == 'skipped') }}
    runs-on: ubuntu-latest
    environment:
      name: staging
      url: https://${{ vars.CHILL_STAGING_DOMAIN }}
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ needs.validate.outputs.sha }}

      - name: Read Vite+ version
        id: vite_plus
        run: |
          set -euo pipefail

          version="$(jq -er '(.devDependencies["vite-plus"] // .dependencies["vite-plus"]) | sub("^[~^]"; "")' package.json)"
          echo "version=${version}" >> "${GITHUB_OUTPUT}"

      - name: Set up Vite+
        uses: voidzero-dev/setup-vp@ca1c46663915d6c1042ae23bd39ab85718bfb0fa # v1.10.0
        with:
          version: ${{ steps.vite_plus.outputs.version }}
          node-version-file: ".node-version"
          cache: false
          run-install: false

      - name: Load Vite+ environment
        run: vp env

      - name: Install dependencies
        run: vp install

      - name: Build staging bundle
        run: vp run build

      - name: Install age
        run: |
          sudo apt-get update
          sudo apt-get install -y age

      - name: Restore encrypted SST local state
        env:
          SST_STATE_AGE_IDENTITY: ${{ secrets.SST_STATE_AGE_IDENTITY }}
          SST_STATE_REPO_TOKEN: ${{ secrets.SST_STATE_REPO_TOKEN }}
        run: scripts/ci/sst-state-git restore

      - name: Deploy app staging to SST
        env:
          WEB_DEPLOY_TARGET: app
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_DEFAULT_ACCOUNT_ID: ${{ vars.CLOUDFLARE_DEFAULT_ACCOUNT_ID }}
        run: vp exec sst deploy --stage staging --print-logs

      - name: Save encrypted SST local state
        if: always()
        env:
          SST_STATE_AGE_IDENTITY: ${{ secrets.SST_STATE_AGE_IDENTITY }}
          SST_STATE_REPO_TOKEN: ${{ secrets.SST_STATE_REPO_TOKEN }}
        run: scripts/ci/sst-state-git save

  deploy-zones:
    needs: [workflow-security, validate]
    if: ${{ needs.workflow-security.result == 'success' && needs.validate.outputs.zones == 'true' }}
    runs-on: ubuntu-latest
    environment:
      name: staging
      url: https://${{ vars.CHILL_STAGING_DOMAIN }}
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ needs.validate.outputs.sha }}

      - name: Read Vite+ version
        id: vite_plus
        run: |
          set -euo pipefail

          version="$(jq -er '(.devDependencies["vite-plus"] // .dependencies["vite-plus"]) | sub("^[~^]"; "")' package.json)"
          echo "version=${version}" >> "${GITHUB_OUTPUT}"

      - name: Set up Vite+
        uses: voidzero-dev/setup-vp@ca1c46663915d6c1042ae23bd39ab85718bfb0fa # v1.10.0
        with:
          version: ${{ steps.vite_plus.outputs.version }}
          node-version-file: ".node-version"
          cache: false
          run-install: false

      - name: Load Vite+ environment
        run: vp env

      - name: Install dependencies
        run: vp install

      - name: Install age
        run: |
          sudo apt-get update
          sudo apt-get install -y age

      - name: Restore encrypted SST local state
        env:
          SST_STATE_AGE_IDENTITY: ${{ secrets.SST_STATE_AGE_IDENTITY }}
          SST_STATE_REPO_TOKEN: ${{ secrets.SST_STATE_REPO_TOKEN }}
        run: scripts/ci/sst-state-git restore

      - name: Deploy staging zone settings to SST
        env:
          WEB_DEPLOY_TARGET: zones
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_DEFAULT_ACCOUNT_ID: ${{ vars.CLOUDFLARE_DEFAULT_ACCOUNT_ID }}
        run: vp exec sst deploy --stage staging --print-logs

      - name: Save encrypted SST local state
        if: always()
        env:
          SST_STATE_AGE_IDENTITY: ${{ secrets.SST_STATE_AGE_IDENTITY }}
          SST_STATE_REPO_TOKEN: ${{ secrets.SST_STATE_REPO_TOKEN }}
        run: scripts/ci/sst-state-git save
