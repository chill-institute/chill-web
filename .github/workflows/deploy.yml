name: Deploy

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to deploy
        required: true
        default: main
        type: string
      target:
        description: Deployment target
        required: true
        default: all
        type: choice
        options:
          - all
          - app
          - redirects
env:
  BINGE_PRODUCTION_DOMAIN: ${{ vars.BINGE_PRODUCTION_DOMAIN }}
  BINGE_PRODUCTION_REDIRECT_DOMAIN: ${{ vars.BINGE_PRODUCTION_REDIRECT_DOMAIN }}
  CHILL_PRODUCTION_DOMAIN: ${{ vars.CHILL_PRODUCTION_DOMAIN }}
  CHILL_STAGING_DOMAIN: ${{ vars.CHILL_STAGING_DOMAIN }}
  SST_STATE_REPO: ${{ vars.SST_STATE_REPO }}
  SST_STATE_REPO_BRANCH: ${{ vars.SST_STATE_REPO_BRANCH }}
  SST_STATE_AGE_RECIPIENT: ${{ vars.SST_STATE_AGE_RECIPIENT }}

permissions:
  contents: read

jobs:
  workflow-security:
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Scan GitHub Actions security
        uses: zizmorcore/zizmor-action@5f14fd08f7cf1cb1609c1e344975f152c7ee938d # v0.5.6
        with:
          advanced-security: false
          annotations: true
          min-confidence: medium
          min-severity: medium
          version: v1.25.2

  validate:
    runs-on: ubuntu-latest
    outputs:
      ref: ${{ steps.validate.outputs.ref }}
      sha: ${{ steps.validate.outputs.sha }}
    steps:
      - name: Validate production ref
        id: validate
        env:
          TARGET: ${{ inputs.target }}
          INPUT_REF: ${{ inputs.ref }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          WORKFLOW_REF: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          if [ "${WORKFLOW_REF}" != "${DEFAULT_BRANCH}" ]; then
            echo "Deploy must be run from ${DEFAULT_BRANCH}; got ${WORKFLOW_REF}" >&2
            exit 1
          fi

          case "${TARGET}" in
            all|app|redirects) ;;
            *)
              echo "unsupported target: ${TARGET}" >&2
              exit 1
              ;;
          esac

          ref="$(printf '%s' "${INPUT_REF}" | tr -d '[:space:]')"
          if [ -z "${ref}" ]; then
            echo "ref is required" >&2
            exit 1
          fi

          default_sha="$(gh api "repos/${REPOSITORY}/git/ref/heads/${DEFAULT_BRANCH}" --jq '.object.sha')"
          if [ "${ref}" = "${DEFAULT_BRANCH}" ]; then
            sha="${default_sha}"
          elif printf '%s' "${ref}" | grep -Eq '^[0-9a-f]{40}$'; then
            sha="${ref}"
            if [ "${sha}" != "${default_sha}" ]; then
              echo "production deploys only support current ${DEFAULT_BRANCH}; got ${ref}" >&2
              exit 1
            fi
          else
            echo "production deploys only support ${DEFAULT_BRANCH} or its current full SHA; got ${ref}" >&2
            exit 1
          fi

          {
            echo "ref=${ref}"
            echo "sha=${sha}"
          } >> "${GITHUB_OUTPUT}"

  deploy-app:
    needs: [workflow-security, validate]
    if: ${{ needs.workflow-security.result == 'success' && (inputs.target == 'all' || inputs.target == 'app') }}
    concurrency:
      group: web-deploy-production
      cancel-in-progress: false
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://${{ vars.CHILL_PRODUCTION_DOMAIN }}
    permissions:
      contents: read
    env:
      WEB_DEPLOY_TARGET: app
      CLOUDFLARE_DEFAULT_ACCOUNT_ID: ${{ vars.CLOUDFLARE_DEFAULT_ACCOUNT_ID }}
      SST_STATE_FILE: ${{ vars.SST_STATE_FILE_PRODUCTION }}
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ needs.validate.outputs.sha }}

      - name: Set up Vite+
        uses: ./.github/actions/setup-vite-plus
        with:
          cache: false

      - name: Build production bundle
        run: vp run build

      - name: Install age
        run: scripts/ci/install-age

      - name: Restore encrypted SST local state
        env:
          SST_STATE_AGE_IDENTITY: ${{ secrets.SST_STATE_AGE_IDENTITY }}
          SST_STATE_REPO_TOKEN: ${{ secrets.SST_STATE_REPO_TOKEN }}
        run: scripts/ci/sst-state-git restore

      - name: Deploy app production to SST
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: vp exec sst deploy --stage production --print-logs

      - name: Save encrypted SST local state
        env:
          SST_STATE_AGE_IDENTITY: ${{ secrets.SST_STATE_AGE_IDENTITY }}
          SST_STATE_REPO_TOKEN: ${{ secrets.SST_STATE_REPO_TOKEN }}
        run: scripts/ci/sst-state-git save

  deploy-redirects:
    needs: [workflow-security, validate, deploy-app]
    if: ${{ always() && needs.workflow-security.result == 'success' && (inputs.target == 'all' || inputs.target == 'redirects') && (needs.deploy-app.result == 'success' || needs.deploy-app.result == 'skipped') }}
    concurrency:
      group: web-deploy-production
      cancel-in-progress: false
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://${{ vars.BINGE_PRODUCTION_DOMAIN }}
    permissions:
      contents: read
    env:
      WEB_DEPLOY_TARGET: redirects
      CLOUDFLARE_DEFAULT_ACCOUNT_ID: ${{ vars.CLOUDFLARE_DEFAULT_ACCOUNT_ID }}
      SST_STATE_FILE: ${{ vars.SST_STATE_FILE_PRODUCTION }}
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ needs.validate.outputs.sha }}

      - name: Set up Vite+
        uses: ./.github/actions/setup-vite-plus
        with:
          cache: false

      - name: Install age
        run: scripts/ci/install-age

      - name: Restore encrypted SST local state
        env:
          SST_STATE_AGE_IDENTITY: ${{ secrets.SST_STATE_AGE_IDENTITY }}
          SST_STATE_REPO_TOKEN: ${{ secrets.SST_STATE_REPO_TOKEN }}
        run: scripts/ci/sst-state-git restore

      - name: Deploy redirects to SST
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: vp exec sst deploy --stage production --print-logs

      - name: Save encrypted SST local state
        env:
          SST_STATE_AGE_IDENTITY: ${{ secrets.SST_STATE_AGE_IDENTITY }}
          SST_STATE_REPO_TOKEN: ${{ secrets.SST_STATE_REPO_TOKEN }}
        run: scripts/ci/sst-state-git save

  smoke-production:
    needs: [validate, deploy-app, deploy-redirects]
    if: ${{ always() && (needs.deploy-app.result == 'success' || needs.deploy-redirects.result == 'success') && needs.deploy-app.result != 'failure' && needs.deploy-redirects.result != 'failure' }}
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Vite+
        uses: ./.github/actions/setup-vite-plus

      - name: Install Playwright browser
        run: vp exec playwright install chromium

      - name: Smoke production app URL
        if: ${{ needs.deploy-app.result == 'success' }}
        env:
          LIVE_WEB_SMOKE_TARGET: production-app
        run: vp exec playwright test e2e/live-hosts.spec.ts

      - name: Smoke production redirect URLs
        if: ${{ needs.deploy-redirects.result == 'success' }}
        env:
          LIVE_WEB_SMOKE_TARGET: production-redirects
        run: vp exec playwright test e2e/live-hosts.spec.ts
