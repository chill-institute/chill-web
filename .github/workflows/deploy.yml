name: Deploy

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to deploy
        required: true
        default: main
        type: string
      target:
        description: Deployment target
        required: true
        default: all
        type: choice
        options:
          - all
          - app
          - redirects
      bootstrap_state:
        description: Allow the first SST production deploy to create missing encrypted state
        required: true
        default: false
        type: boolean

env:
  BINGE_PRODUCTION_DOMAIN: ${{ vars.BINGE_PRODUCTION_DOMAIN }}
  BINGE_PRODUCTION_REDIRECT_DOMAIN: ${{ vars.BINGE_PRODUCTION_REDIRECT_DOMAIN }}
  CHILL_PRODUCTION_DOMAIN: ${{ vars.CHILL_PRODUCTION_DOMAIN }}
  CHILL_STAGING_DOMAIN: ${{ vars.CHILL_STAGING_DOMAIN }}
  SST_STATE_REPO: ${{ vars.SST_STATE_REPO }}
  SST_STATE_REPO_BRANCH: ${{ vars.SST_STATE_REPO_BRANCH }}
  SST_STATE_AGE_RECIPIENT: ${{ vars.SST_STATE_AGE_RECIPIENT }}
  VITE_PLUS_VERSION: "0.1.21"

permissions:
  contents: read

jobs:
  workflow-security:
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Scan GitHub Actions security
        uses: zizmorcore/zizmor-action@5f14fd08f7cf1cb1609c1e344975f152c7ee938d # v0.5.6
        with:
          advanced-security: false
          annotations: true
          min-confidence: medium
          min-severity: medium
          version: v1.25.2

  validate:
    runs-on: ubuntu-latest
    outputs:
      ref: ${{ steps.validate.outputs.ref }}
      sha: ${{ steps.validate.outputs.sha }}
    steps:
      - name: Validate production ref
        id: validate
        env:
          TARGET: ${{ inputs.target }}
          BOOTSTRAP_STATE: ${{ inputs.bootstrap_state }}
          INPUT_REF: ${{ inputs.ref }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          WORKFLOW_REF: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          if [ "${WORKFLOW_REF}" != "${DEFAULT_BRANCH}" ]; then
            echo "Deploy must be run from ${DEFAULT_BRANCH}; got ${WORKFLOW_REF}" >&2
            exit 1
          fi

          ref="$(printf '%s' "${INPUT_REF}" | tr -d '[:space:]')"
          if [ -z "${ref}" ]; then
            echo "ref is required" >&2
            exit 1
          fi

          default_sha="$(gh api "repos/${REPOSITORY}/git/ref/heads/${DEFAULT_BRANCH}" --jq '.object.sha')"
          if [ "${ref}" = "${DEFAULT_BRANCH}" ]; then
            sha="${default_sha}"
          elif printf '%s' "${ref}" | grep -Eq '^[0-9a-f]{40}$'; then
            sha="${ref}"
            if [ "${sha}" != "${default_sha}" ]; then
              echo "production deploys only support current ${DEFAULT_BRANCH}; got ${ref}" >&2
              exit 1
            fi
          else
            echo "production deploys only support ${DEFAULT_BRANCH} or its current full SHA; got ${ref}" >&2
            exit 1
          fi

          {
            echo "ref=${ref}"
            echo "sha=${sha}"
          } >> "${GITHUB_OUTPUT}"

  deploy-app:
    needs: [workflow-security, validate]
    if: ${{ needs.workflow-security.result == 'success' && (inputs.target == 'all' || inputs.target == 'app') }}
    concurrency:
      group: web-deploy-production
      cancel-in-progress: false
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://${{ vars.CHILL_PRODUCTION_DOMAIN }}
    permissions:
      contents: read
    env:
      WEB_DEPLOY_TARGET: app
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_DEFAULT_ACCOUNT_ID: ${{ vars.CLOUDFLARE_DEFAULT_ACCOUNT_ID }}
      SST_STATE_AGE_IDENTITY: ${{ secrets.SST_STATE_AGE_IDENTITY }}
      SST_STATE_FILE: ${{ vars.SST_STATE_FILE_PRODUCTION }}
      SST_STATE_REPO_TOKEN: ${{ secrets.SST_STATE_REPO_TOKEN }}
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ needs.validate.outputs.sha }}

      - name: Set up Vite+
        uses: voidzero-dev/setup-vp@ca1c46663915d6c1042ae23bd39ab85718bfb0fa # v1.10.0
        with:
          version: ${{ env.VITE_PLUS_VERSION }}
          node-version-file: ".node-version"
          cache: false
          run-install: false

      - name: Load Vite+ environment
        run: vp env

      - name: Install dependencies
        run: vp install

      - name: Build production bundle
        run: vp run build

      - name: Install age
        run: |
          sudo apt-get update
          sudo apt-get install -y age

      - name: Restore encrypted SST local state
        env:
          SST_STATE_BOOTSTRAP: ${{ inputs.bootstrap_state }}
        run: scripts/ci/sst-state-git restore

      - name: Refresh app production SST state
        if: ${{ !inputs.bootstrap_state }}
        run: vp exec sst refresh --stage production --print-logs

      - name: Deploy app production to SST
        run: vp exec sst deploy --stage production --print-logs

      - name: Save encrypted SST local state
        run: scripts/ci/sst-state-git save

  deploy-redirects:
    needs: [workflow-security, validate, deploy-app]
    if: ${{ always() && needs.workflow-security.result == 'success' && (inputs.target == 'all' || inputs.target == 'redirects') && (needs.deploy-app.result == 'success' || needs.deploy-app.result == 'skipped') }}
    concurrency:
      group: web-deploy-production
      cancel-in-progress: false
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://${{ vars.BINGE_PRODUCTION_DOMAIN }}
    permissions:
      contents: read
    env:
      WEB_DEPLOY_TARGET: redirects
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_DEFAULT_ACCOUNT_ID: ${{ vars.CLOUDFLARE_DEFAULT_ACCOUNT_ID }}
      SST_STATE_AGE_IDENTITY: ${{ secrets.SST_STATE_AGE_IDENTITY }}
      SST_STATE_FILE: ${{ vars.SST_STATE_FILE_PRODUCTION }}
      SST_STATE_REPO_TOKEN: ${{ secrets.SST_STATE_REPO_TOKEN }}
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ needs.validate.outputs.sha }}

      - name: Set up Vite+
        uses: voidzero-dev/setup-vp@ca1c46663915d6c1042ae23bd39ab85718bfb0fa # v1.10.0
        with:
          version: ${{ env.VITE_PLUS_VERSION }}
          node-version-file: ".node-version"
          cache: false
          run-install: false

      - name: Load Vite+ environment
        run: vp env

      - name: Install dependencies
        run: vp install

      - name: Install age
        run: |
          sudo apt-get update
          sudo apt-get install -y age

      - name: Restore encrypted SST local state
        env:
          SST_STATE_BOOTSTRAP: ${{ inputs.bootstrap_state }}
        run: scripts/ci/sst-state-git restore

      - name: Refresh binge redirect SST state
        if: ${{ !inputs.bootstrap_state }}
        run: vp exec sst refresh --stage production --print-logs

      - name: Deploy binge redirects to SST
        run: vp exec sst deploy --stage production --print-logs

      - name: Save encrypted SST local state
        run: scripts/ci/sst-state-git save

  deploy-summary:
    needs: [validate, deploy-app, deploy-redirects]
    if: ${{ always() && (needs.deploy-app.result != 'skipped' || needs.deploy-redirects.result != 'skipped') }}
    runs-on: ubuntu-latest
    steps:
      - name: Publish summary
        env:
          REF: ${{ inputs.ref }}
          SHA: ${{ needs.validate.outputs.sha }}
          TARGET: ${{ inputs.target }}
          BOOTSTRAP_STATE: ${{ inputs.bootstrap_state }}
          APP_RESULT: ${{ needs.deploy-app.result }}
          REDIRECTS_RESULT: ${{ needs.deploy-redirects.result }}
        run: |
          app_url="${CHILL_PRODUCTION_DOMAIN}"
          binge_url="${BINGE_PRODUCTION_DOMAIN}"

          {
            echo "## Manual deploy"
            echo
            echo "- Ref: \`${REF}\`"
            echo "- SHA: \`${SHA}\`"
            echo "- Requested target: \`${TARGET}\`"
            echo "- Environment: \`production\`"
            echo "- Bootstrap state: \`${BOOTSTRAP_STATE}\`"
            if [ "${APP_RESULT}" = "success" ]; then
              echo "- App: [https://${app_url}](https://${app_url})"
            elif [ "${APP_RESULT}" = "skipped" ]; then
              echo "- App: skipped"
            else
              echo "- App: ${APP_RESULT}"
            fi
            if [ "${REDIRECTS_RESULT}" = "success" ]; then
              echo "- Binge redirect: [https://${binge_url}](https://${binge_url}) -> [https://${app_url}](https://${app_url})"
            elif [ "${REDIRECTS_RESULT}" = "skipped" ]; then
              echo "- Binge redirect: skipped"
            else
              echo "- Binge redirect: ${REDIRECTS_RESULT}"
            fi
          } >> "${GITHUB_STEP_SUMMARY}"
