name: Deploy

on:
  workflow_dispatch:
    inputs:
      target:
        description: Deployment target
        required: true
        default: all
        type: choice
        options:
          - all
          - app
          - redirects
permissions:
  contents: read

jobs:
  workflow-security:
    uses: ./.github/workflows/_workflow-security.yml
    permissions:
      actions: read
      contents: read

  validate:
    needs: workflow-security
    if: ${{ needs.workflow-security.result == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Require default branch
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          WORKFLOW_REF: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          if [ "${WORKFLOW_REF}" != "${DEFAULT_BRANCH}" ]; then
            echo "Deploy must be run from ${DEFAULT_BRANCH}; got ${WORKFLOW_REF}" >&2
            exit 1
          fi

  deploy-app:
    needs: [workflow-security, validate]
    if: ${{ needs.workflow-security.result == 'success' && (inputs.target == 'all' || inputs.target == 'app') }}
    concurrency:
      group: web-deploy-production
      cancel-in-progress: false
    uses: ./.github/workflows/_deploy-app.yml
    with:
      environment-name: production
      environment-url: https://${{ vars.CHILL_PRODUCTION_DOMAIN }}
      ref: ${{ github.sha }}
      sst-state-file: ${{ vars.SST_STATE_FILE_PRODUCTION }}
    secrets:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      SST_STATE_AGE_IDENTITY: ${{ secrets.SST_STATE_AGE_IDENTITY }}
      SST_STATE_REPO_TOKEN: ${{ secrets.SST_STATE_REPO_TOKEN }}
      SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}

  deploy-redirects:
    needs: [workflow-security, validate, deploy-app]
    if: ${{ always() && needs.workflow-security.result == 'success' && (inputs.target == 'all' || inputs.target == 'redirects') && (needs.deploy-app.result == 'success' || needs.deploy-app.result == 'skipped') }}
    concurrency:
      group: web-deploy-production
      cancel-in-progress: false
    uses: ./.github/workflows/_deploy-sst-target.yml
    with:
      environment-name: production
      environment-url: https://${{ vars.BINGE_PRODUCTION_DOMAIN }}
      ref: ${{ github.sha }}
      sst-stage: production
      sst-state-file: ${{ vars.SST_STATE_FILE_PRODUCTION }}
      web-deploy-target: redirects
    secrets:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      SST_STATE_AGE_IDENTITY: ${{ secrets.SST_STATE_AGE_IDENTITY }}
      SST_STATE_REPO_TOKEN: ${{ secrets.SST_STATE_REPO_TOKEN }}
