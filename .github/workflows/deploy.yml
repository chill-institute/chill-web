name: Deploy

on:
  workflow_dispatch:
    inputs:
      target:
        description: Deployment target
        required: true
        default: all
        type: choice
        options:
          - all
          - app
          - redirects
env:
  BINGE_PRODUCTION_DOMAIN: ${{ vars.BINGE_PRODUCTION_DOMAIN }}
  BINGE_PRODUCTION_REDIRECT_DOMAIN: ${{ vars.BINGE_PRODUCTION_REDIRECT_DOMAIN }}
  CHILL_PRODUCTION_DOMAIN: ${{ vars.CHILL_PRODUCTION_DOMAIN }}
  CHILL_STAGING_DOMAIN: ${{ vars.CHILL_STAGING_DOMAIN }}
  SST_STATE_REPO: ${{ vars.SST_STATE_REPO }}
  SST_STATE_AGE_RECIPIENT: ${{ vars.SST_STATE_AGE_RECIPIENT }}

permissions:
  contents: read

jobs:
  workflow-security:
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Scan GitHub Actions security
        uses: zizmorcore/zizmor-action@5f14fd08f7cf1cb1609c1e344975f152c7ee938d # v0.5.6
        with:
          advanced-security: false
          annotations: true
          min-confidence: medium
          min-severity: medium
          version: v1.25.2

  validate:
    needs: workflow-security
    if: ${{ needs.workflow-security.result == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Require default branch
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          WORKFLOW_REF: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          if [ "${WORKFLOW_REF}" != "${DEFAULT_BRANCH}" ]; then
            echo "Deploy must be run from ${DEFAULT_BRANCH}; got ${WORKFLOW_REF}" >&2
            exit 1
          fi

  deploy-app:
    needs: [workflow-security, validate]
    if: ${{ needs.workflow-security.result == 'success' && (inputs.target == 'all' || inputs.target == 'app') }}
    concurrency:
      group: web-deploy-production
      cancel-in-progress: false
    uses: ./.github/workflows/build-and-deploy-app.yml
    with:
      environment-name: production
      environment-url: https://${{ vars.CHILL_PRODUCTION_DOMAIN }}
      ref: ${{ github.sha }}

  deploy-redirects:
    needs: [workflow-security, validate, deploy-app]
    if: ${{ always() && needs.workflow-security.result == 'success' && (inputs.target == 'all' || inputs.target == 'redirects') && (needs.deploy-app.result == 'success' || needs.deploy-app.result == 'skipped') }}
    concurrency:
      group: web-deploy-production
      cancel-in-progress: false
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://${{ vars.BINGE_PRODUCTION_DOMAIN }}
    permissions:
      contents: read
    env:
      WEB_DEPLOY_TARGET: redirects
      CLOUDFLARE_DEFAULT_ACCOUNT_ID: ${{ vars.CLOUDFLARE_DEFAULT_ACCOUNT_ID }}
      SST_STATE_FILE: ${{ vars.SST_STATE_FILE_PRODUCTION }}
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.sha }}

      - name: Set up Vite+
        uses: ./.github/actions/setup-vite-plus
        with:
          cache: false

      - name: Install age
        run: scripts/ci/install-age

      - name: Restore encrypted SST local state
        env:
          SST_STATE_AGE_IDENTITY: ${{ secrets.SST_STATE_AGE_IDENTITY }}
          SST_STATE_REPO_TOKEN: ${{ secrets.SST_STATE_REPO_TOKEN }}
        run: scripts/ci/sst-state-git restore

      - name: Deploy redirects to SST
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: vp exec sst deploy --stage production --print-logs

      - name: Save encrypted SST local state
        env:
          SST_STATE_AGE_IDENTITY: ${{ secrets.SST_STATE_AGE_IDENTITY }}
          SST_STATE_REPO_TOKEN: ${{ secrets.SST_STATE_REPO_TOKEN }}
        run: scripts/ci/sst-state-git save
