name: Deploy

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to deploy
        required: true
        default: main
        type: string
      app:
        description: App surface to deploy
        required: true
        default: all
        type: choice
        options:
          - all
          - chill
          - binge

env:
  VITE_PLUS_VERSION: "0.1.20"

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    outputs:
      ref: ${{ steps.validate.outputs.ref }}
      sha: ${{ steps.validate.outputs.sha }}
    steps:
      - name: Validate production ref
        id: validate
        env:
          INPUT_REF: ${{ inputs.ref }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          WORKFLOW_REF: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          if [ "${WORKFLOW_REF}" != "${DEFAULT_BRANCH}" ]; then
            echo "Deploy must be run from ${DEFAULT_BRANCH}; got ${WORKFLOW_REF}" >&2
            exit 1
          fi

          ref="$(printf '%s' "${INPUT_REF}" | tr -d '[:space:]')"
          if [ -z "${ref}" ]; then
            echo "ref is required" >&2
            exit 1
          fi

          default_sha="$(gh api "repos/${REPOSITORY}/git/ref/heads/${DEFAULT_BRANCH}" --jq '.object.sha')"
          if [ "${ref}" = "${DEFAULT_BRANCH}" ]; then
            sha="${default_sha}"
          elif printf '%s' "${ref}" | grep -Eq '^[0-9a-f]{40}$'; then
            sha="${ref}"
            if [ "${sha}" != "${default_sha}" ]; then
              echo "production deploys only support current ${DEFAULT_BRANCH}; got ${ref}" >&2
              exit 1
            fi
          else
            echo "production deploys only support ${DEFAULT_BRANCH} or its current full SHA; got ${ref}" >&2
            exit 1
          fi

          {
            echo "ref=${ref}"
            echo "sha=${sha}"
          } >> "${GITHUB_OUTPUT}"

  deploy-chill:
    needs: validate
    if: ${{ inputs.app == 'all' || inputs.app == 'chill' }}
    concurrency:
      group: web-deploy-production-chill
      cancel-in-progress: false
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ needs.validate.outputs.sha }}

      - name: Set up Vite+
        uses: voidzero-dev/setup-vp@ca1c46663915d6c1042ae23bd39ab85718bfb0fa # v1.10.0
        with:
          version: ${{ env.VITE_PLUS_VERSION }}
          node-version-file: ".node-version"
          cache: false
          run-install: false

      - name: Load Vite+ environment
        run: vp env

      - name: Install dependencies
        run: vp install

      - name: Build chill production bundle
        run: vp run build:chill

      - name: Deploy chill production to Cloudflare Pages
        uses: ./.github/actions/cloudflare-pages-deploy
        with:
          api-token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          account-id: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          project-name: chill-institute
          dist-dir: apps/chill/dist
          branch: main

  deploy-binge:
    needs: validate
    if: ${{ inputs.app == 'all' || inputs.app == 'binge' }}
    concurrency:
      group: web-deploy-production-binge
      cancel-in-progress: false
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ needs.validate.outputs.sha }}

      - name: Set up Vite+
        uses: voidzero-dev/setup-vp@ca1c46663915d6c1042ae23bd39ab85718bfb0fa # v1.10.0
        with:
          version: ${{ env.VITE_PLUS_VERSION }}
          node-version-file: ".node-version"
          cache: false
          run-install: false

      - name: Load Vite+ environment
        run: vp env

      - name: Install dependencies
        run: vp install

      - name: Build binge production bundle
        run: vp run build:binge

      - name: Deploy binge production to Cloudflare Pages
        uses: ./.github/actions/cloudflare-pages-deploy
        with:
          api-token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          account-id: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          project-name: binge-institute
          dist-dir: apps/binge/dist
          branch: main

  deploy-summary:
    needs: [validate, deploy-chill, deploy-binge]
    if: ${{ always() && (needs.deploy-chill.result == 'success' || needs.deploy-binge.result == 'success') }}
    runs-on: ubuntu-latest
    steps:
      - name: Publish summary
        env:
          REF: ${{ inputs.ref }}
          SHA: ${{ needs.validate.outputs.sha }}
          APP: ${{ inputs.app }}
          CHILL_RESULT: ${{ needs.deploy-chill.result }}
          BINGE_RESULT: ${{ needs.deploy-binge.result }}
        run: |
          {
            echo "## Manual deploy"
            echo
            echo "- Ref: \`${REF}\`"
            echo "- SHA: \`${SHA}\`"
            echo "- Requested app: \`${APP}\`"
            echo "- Environment: \`production\`"
            if [ "${CHILL_RESULT}" = "success" ]; then
              echo "- Chill: [https://chill.institute](https://chill.institute)"
            elif [ "${APP}" = "binge" ]; then
              echo "- Chill: skipped"
            fi
            if [ "${BINGE_RESULT}" = "success" ]; then
              echo "- Binge: [https://binge.institute](https://binge.institute)"
            elif [ "${APP}" = "chill" ]; then
              echo "- Binge: skipped"
            fi
          } >> "${GITHUB_STEP_SUMMARY}"
