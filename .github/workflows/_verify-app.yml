name: Verify App

on:
  workflow_call:
    inputs:
      ref:
        description: Git ref to verify.
        required: false
        type: string

permissions:
  contents: read

jobs:
  verify-app:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.ref || github.sha }}

      - name: Set up Vite+
        uses: ./.github/actions/setup-vite-plus

      - name: Verify app
        run: vp run verify
