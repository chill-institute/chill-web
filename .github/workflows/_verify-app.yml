name: Verify App

on:
  workflow_call:
    inputs:
      ref:
        description: Git ref to verify.
        required: false
        type: string

permissions:
  contents: read

jobs:
  verify-app:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ inputs.ref || github.sha }}

      - name: Set up Vite+
        uses: ./.github/actions/setup-vite-plus

      - name: Verify app
        run: vp run verify
