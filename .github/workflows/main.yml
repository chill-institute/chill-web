name: Main

on:
  push:
    branches:
      - main

env:
  BINGE_PRODUCTION_DOMAIN: ${{ vars.BINGE_PRODUCTION_DOMAIN || 'binge.institute' }}
  BINGE_PRODUCTION_REDIRECT_DOMAIN: ${{ vars.BINGE_PRODUCTION_REDIRECT_DOMAIN || 'www.binge.institute' }}
  BINGE_PRODUCTION_VALIDATION_DOMAIN: ${{ vars.BINGE_PRODUCTION_VALIDATION_DOMAIN || 'next.binge.institute' }}
  BINGE_STAGING_DOMAIN: ${{ vars.BINGE_STAGING_DOMAIN || 'staging.binge.institute' }}
  CHILL_PRODUCTION_DOMAIN: ${{ vars.CHILL_PRODUCTION_DOMAIN || 'chill.institute' }}
  CHILL_PRODUCTION_REDIRECT_DOMAIN: ${{ vars.CHILL_PRODUCTION_REDIRECT_DOMAIN || 'www.chill.institute' }}
  CHILL_PRODUCTION_VALIDATION_DOMAIN: ${{ vars.CHILL_PRODUCTION_VALIDATION_DOMAIN || 'next.chill.institute' }}
  CHILL_STAGING_DOMAIN: ${{ vars.CHILL_STAGING_DOMAIN || 'staging.chill.institute' }}
  SST_PRODUCTION_AUTO_DEPLOY_ENABLED: ${{ vars.SST_PRODUCTION_AUTO_DEPLOY_ENABLED || 'false' }}
  SST_PRODUCTION_DOMAIN_MODE: ${{ vars.SST_PRODUCTION_DOMAIN_MODE || 'validation' }}
  SST_STATE_REPO: ${{ vars.SST_STATE_REPO }}
  SST_STATE_REPO_BRANCH: ${{ vars.SST_STATE_REPO_BRANCH || 'main' }}
  SST_STATE_AGE_RECIPIENT: ${{ vars.SST_STATE_AGE_RECIPIENT }}
  VITE_PLUS_VERSION: "0.1.20"

permissions:
  contents: read

jobs:
  workflow-security:
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Scan GitHub Actions security
        uses: zizmorcore/zizmor-action@5f14fd08f7cf1cb1609c1e344975f152c7ee938d # v0.5.6
        with:
          advanced-security: false
          annotations: true
          min-confidence: medium
          min-severity: medium
          version: v1.25.2

  changes:
    runs-on: ubuntu-latest
    outputs:
      chill: ${{ steps.filter.outputs.chill }}
      binge: ${{ steps.filter.outputs.binge }}
      deploy_chill: ${{ steps.filter.outputs.deploy_chill }}
      deploy_binge: ${{ steps.filter.outputs.deploy_binge }}
      any_app: ${{ steps.set_outputs.outputs.any_app }}
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Detect changed surfaces
        id: filter
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        with:
          filters: |
            chill:
              - 'apps/chill/**'
              - 'packages/**'
              - 'tools/**'
              - '.node-version'
              - '.gitignore'
              - '.vite-hooks/**'
              - '.githooks/**'
              - '.github/actions/**'
              - 'knip.json'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - 'sst.config.ts'
              - 'tsconfig.json'
              - 'vite.config.ts'
            binge:
              - 'apps/binge/**'
              - 'packages/**'
              - 'tools/**'
              - '.node-version'
              - '.gitignore'
              - '.vite-hooks/**'
              - '.githooks/**'
              - '.github/actions/**'
              - 'knip.json'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - 'sst.config.ts'
              - 'tsconfig.json'
              - 'vite.config.ts'
            deploy_chill:
              - 'apps/chill/**'
              - '!apps/chill/e2e/**'
              - 'packages/**'
              - 'tools/**'
              - '.node-version'
              - '.gitignore'
              - '.vite-hooks/**'
              - '.githooks/**'
              - 'knip.json'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - 'sst.config.ts'
              - 'tsconfig.json'
              - 'vite.config.ts'
            deploy_binge:
              - 'apps/binge/**'
              - '!apps/binge/e2e/**'
              - 'packages/**'
              - 'tools/**'
              - '.node-version'
              - '.gitignore'
              - '.vite-hooks/**'
              - '.githooks/**'
              - 'knip.json'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - 'sst.config.ts'
              - 'tsconfig.json'
              - 'vite.config.ts'

      - name: Publish change summary
        id: set_outputs
        env:
          CHILL_CHANGED: ${{ steps.filter.outputs.chill }}
          BINGE_CHANGED: ${{ steps.filter.outputs.binge }}
          CHILL_DEPLOY_CHANGED: ${{ steps.filter.outputs.deploy_chill }}
          BINGE_DEPLOY_CHANGED: ${{ steps.filter.outputs.deploy_binge }}
        run: |
          if [ "${CHILL_CHANGED}" = "true" ] || [ "${BINGE_CHANGED}" = "true" ]; then
            echo "any_app=true" >> "${GITHUB_OUTPUT}"
          else
            echo "any_app=false" >> "${GITHUB_OUTPUT}"
          fi

          {
            echo "## Changed app surfaces"
            echo
            echo "- Chill: \`${CHILL_CHANGED}\`"
            echo "- Binge: \`${BINGE_CHANGED}\`"
            echo "- Chill deploy: \`${CHILL_DEPLOY_CHANGED}\`"
            echo "- Binge deploy: \`${BINGE_DEPLOY_CHANGED}\`"
          } >> "${GITHUB_STEP_SUMMARY}"

  verify-chill:
    needs: changes
    if: ${{ needs.changes.outputs.chill == 'true' }}
    concurrency:
      group: web-main-verify-chill-${{ github.ref }}
      cancel-in-progress: true
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Vite+
        uses: voidzero-dev/setup-vp@ca1c46663915d6c1042ae23bd39ab85718bfb0fa # v1.10.0
        with:
          version: ${{ env.VITE_PLUS_VERSION }}
          node-version-file: ".node-version"
          cache: true
          run-install: false

      - name: Load Vite+ environment
        run: vp env

      - name: Install dependencies
        run: vp install

      - name: Verify chill app
        run: |
          vp run check:chill
          vp run test:chill
          vp run build:chill

      - name: Upload chill build artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: chill-dist
          path: apps/chill/dist
          if-no-files-found: error

  verify-binge:
    needs: changes
    if: ${{ needs.changes.outputs.binge == 'true' }}
    concurrency:
      group: web-main-verify-binge-${{ github.ref }}
      cancel-in-progress: true
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Vite+
        uses: voidzero-dev/setup-vp@ca1c46663915d6c1042ae23bd39ab85718bfb0fa # v1.10.0
        with:
          version: ${{ env.VITE_PLUS_VERSION }}
          node-version-file: ".node-version"
          cache: true
          run-install: false

      - name: Load Vite+ environment
        run: vp env

      - name: Install dependencies
        run: vp install

      - name: Verify binge app
        run: |
          vp run check:binge
          vp run test:binge
          vp run build:binge

      - name: Upload binge build artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: binge-dist
          path: apps/binge/dist
          if-no-files-found: error

  e2e-chill:
    needs: verify-chill
    if: ${{ needs.verify-chill.result == 'success' }}
    concurrency:
      group: web-main-e2e-chill-${{ github.ref }}
      cancel-in-progress: true
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Download chill build artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: chill-dist
          path: apps/chill/dist

      - name: Set up Vite+
        uses: voidzero-dev/setup-vp@ca1c46663915d6c1042ae23bd39ab85718bfb0fa # v1.10.0
        with:
          version: ${{ env.VITE_PLUS_VERSION }}
          node-version-file: ".node-version"
          cache: true
          run-install: false

      - name: Load Vite+ environment
        run: vp env

      - name: Install dependencies
        run: vp install

      - name: Install Playwright browser
        run: vp exec --filter ./apps/chill playwright install chromium

      - name: Run chill end-to-end tests
        run: vp run e2e:chill

      - name: Upload chill Playwright artifacts
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-artifacts-chill
          path: |
            apps/chill/playwright-report
            apps/chill/test-results
          if-no-files-found: ignore

  e2e-binge:
    needs: verify-binge
    if: ${{ needs.verify-binge.result == 'success' }}
    concurrency:
      group: web-main-e2e-binge-${{ github.ref }}
      cancel-in-progress: true
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Download binge build artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: binge-dist
          path: apps/binge/dist

      - name: Set up Vite+
        uses: voidzero-dev/setup-vp@ca1c46663915d6c1042ae23bd39ab85718bfb0fa # v1.10.0
        with:
          version: ${{ env.VITE_PLUS_VERSION }}
          node-version-file: ".node-version"
          cache: true
          run-install: false

      - name: Load Vite+ environment
        run: vp env

      - name: Install dependencies
        run: vp install

      - name: Install Playwright browser
        run: vp exec --filter ./apps/binge playwright install chromium

      - name: Run binge end-to-end tests
        run: vp run e2e:binge

      - name: Upload binge Playwright artifacts
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-artifacts-binge
          path: |
            apps/binge/playwright-report
            apps/binge/test-results
          if-no-files-found: ignore

  deploy-chill:
    needs: [workflow-security, changes, verify-chill, e2e-chill]
    if: ${{ vars.SST_PRODUCTION_AUTO_DEPLOY_ENABLED == 'true' && needs.changes.outputs.deploy_chill == 'true' && needs.workflow-security.result == 'success' && needs.verify-chill.result == 'success' && needs.e2e-chill.result == 'success' }}
    concurrency:
      group: web-deploy-production-chill
      cancel-in-progress: false
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://${{ (vars.SST_PRODUCTION_DOMAIN_MODE == 'apex' && (vars.CHILL_PRODUCTION_DOMAIN || 'chill.institute')) || (vars.CHILL_PRODUCTION_VALIDATION_DOMAIN || 'next.chill.institute') }}
    permissions:
      contents: read
    env:
      SST_STATE_FILE: ${{ vars.SST_STATE_FILE_PRODUCTION_CHILL || 'chill-web/production/chill/sst-local-state.tar.gz.age' }}
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Download chill build artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: chill-dist
          path: apps/chill/dist

      - name: Set up Vite+
        uses: voidzero-dev/setup-vp@ca1c46663915d6c1042ae23bd39ab85718bfb0fa # v1.10.0
        with:
          version: ${{ env.VITE_PLUS_VERSION }}
          node-version-file: ".node-version"
          cache: false
          run-install: false

      - name: Load Vite+ environment
        run: vp env

      - name: Install dependencies
        run: vp install

      - name: Install age
        run: |
          sudo apt-get update
          sudo apt-get install -y age

      - name: Restore encrypted SST local state
        env:
          SST_STATE_AGE_IDENTITY: ${{ secrets.SST_STATE_AGE_IDENTITY }}
          SST_STATE_REPO_TOKEN: ${{ secrets.SST_STATE_REPO_TOKEN }}
        run: scripts/ci/sst-state-git restore

      - name: Deploy chill production to SST
        env:
          CHILL_WEB_APP: chill
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_DEFAULT_ACCOUNT_ID: ${{ vars.CLOUDFLARE_DEFAULT_ACCOUNT_ID }}
        run: vp exec sst deploy --stage production --print-logs

      - name: Ensure chill validation domain
        if: ${{ vars.SST_PRODUCTION_DOMAIN_MODE == 'apex' }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_DEFAULT_ACCOUNT_ID: ${{ vars.CLOUDFLARE_DEFAULT_ACCOUNT_ID }}
        run: scripts/ci/ensure-cloudflare-workers-domain "${CHILL_PRODUCTION_DOMAIN}" "${CHILL_PRODUCTION_VALIDATION_DOMAIN}" "chill-web-chill-production-webrouterscript"

      - name: Save encrypted SST local state
        if: always()
        env:
          SST_STATE_AGE_IDENTITY: ${{ secrets.SST_STATE_AGE_IDENTITY }}
          SST_STATE_REPO_TOKEN: ${{ secrets.SST_STATE_REPO_TOKEN }}
        run: scripts/ci/sst-state-git save

  deploy-binge:
    needs: [workflow-security, changes, verify-binge, e2e-binge]
    if: ${{ vars.SST_PRODUCTION_AUTO_DEPLOY_ENABLED == 'true' && needs.changes.outputs.deploy_binge == 'true' && needs.workflow-security.result == 'success' && needs.verify-binge.result == 'success' && needs.e2e-binge.result == 'success' }}
    concurrency:
      group: web-deploy-production-binge
      cancel-in-progress: false
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://${{ (vars.SST_PRODUCTION_DOMAIN_MODE == 'apex' && (vars.BINGE_PRODUCTION_DOMAIN || 'binge.institute')) || (vars.BINGE_PRODUCTION_VALIDATION_DOMAIN || 'next.binge.institute') }}
    permissions:
      contents: read
    env:
      SST_STATE_FILE: ${{ vars.SST_STATE_FILE_PRODUCTION_BINGE || 'chill-web/production/binge/sst-local-state.tar.gz.age' }}
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Download binge build artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: binge-dist
          path: apps/binge/dist

      - name: Set up Vite+
        uses: voidzero-dev/setup-vp@ca1c46663915d6c1042ae23bd39ab85718bfb0fa # v1.10.0
        with:
          version: ${{ env.VITE_PLUS_VERSION }}
          node-version-file: ".node-version"
          cache: false
          run-install: false

      - name: Load Vite+ environment
        run: vp env

      - name: Install dependencies
        run: vp install

      - name: Install age
        run: |
          sudo apt-get update
          sudo apt-get install -y age

      - name: Restore encrypted SST local state
        env:
          SST_STATE_AGE_IDENTITY: ${{ secrets.SST_STATE_AGE_IDENTITY }}
          SST_STATE_REPO_TOKEN: ${{ secrets.SST_STATE_REPO_TOKEN }}
        run: scripts/ci/sst-state-git restore

      - name: Deploy binge production to SST
        env:
          CHILL_WEB_APP: binge
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_DEFAULT_ACCOUNT_ID: ${{ vars.CLOUDFLARE_DEFAULT_ACCOUNT_ID }}
        run: vp exec sst deploy --stage production --print-logs

      - name: Ensure binge validation domain
        if: ${{ vars.SST_PRODUCTION_DOMAIN_MODE == 'apex' }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_DEFAULT_ACCOUNT_ID: ${{ vars.CLOUDFLARE_DEFAULT_ACCOUNT_ID }}
        run: scripts/ci/ensure-cloudflare-workers-domain "${BINGE_PRODUCTION_DOMAIN}" "${BINGE_PRODUCTION_VALIDATION_DOMAIN}" "chill-web-binge-production-webrouterscript"

      - name: Save encrypted SST local state
        if: always()
        env:
          SST_STATE_AGE_IDENTITY: ${{ secrets.SST_STATE_AGE_IDENTITY }}
          SST_STATE_REPO_TOKEN: ${{ secrets.SST_STATE_REPO_TOKEN }}
        run: scripts/ci/sst-state-git save

  deploy-summary:
    needs: [changes, deploy-chill, deploy-binge]
    if: ${{ always() && (needs.deploy-chill.result == 'success' || needs.deploy-binge.result == 'success') }}
    runs-on: ubuntu-latest
    steps:
      - name: Publish summary
        env:
          CHILL_RESULT: ${{ needs.deploy-chill.result }}
          BINGE_RESULT: ${{ needs.deploy-binge.result }}
        run: |
          chill_url="${CHILL_PRODUCTION_VALIDATION_DOMAIN}"
          binge_url="${BINGE_PRODUCTION_VALIDATION_DOMAIN}"
          if [ "${SST_PRODUCTION_DOMAIN_MODE}" = "apex" ]; then
            chill_url="${CHILL_PRODUCTION_DOMAIN}"
            binge_url="${BINGE_PRODUCTION_DOMAIN}"
          fi

          {
            echo "## Web deploy"
            echo
            echo "- Environment: \`production\`"
            echo "- Domain mode: \`${SST_PRODUCTION_DOMAIN_MODE}\`"
            if [ "${CHILL_RESULT}" = "success" ]; then
              echo "- Chill: [https://${chill_url}](https://${chill_url})"
            else
              echo "- Chill: skipped"
            fi
            if [ "${BINGE_RESULT}" = "success" ]; then
              echo "- Binge: [https://${binge_url}](https://${binge_url})"
            else
              echo "- Binge: skipped"
            fi
            echo "- Flow: \`push Main workflow\`"
          } >> "${GITHUB_STEP_SUMMARY}"
