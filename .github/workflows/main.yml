name: Main

on:
  push:
    branches:
      - main

env:
  BINGE_PRODUCTION_DOMAIN: ${{ vars.BINGE_PRODUCTION_DOMAIN }}
  BINGE_PRODUCTION_REDIRECT_DOMAIN: ${{ vars.BINGE_PRODUCTION_REDIRECT_DOMAIN }}
  CHILL_PRODUCTION_DOMAIN: ${{ vars.CHILL_PRODUCTION_DOMAIN }}
  CHILL_STAGING_DOMAIN: ${{ vars.CHILL_STAGING_DOMAIN }}
  SST_PRODUCTION_AUTO_DEPLOY_ENABLED: ${{ vars.SST_PRODUCTION_AUTO_DEPLOY_ENABLED }}
  SST_STATE_REPO: ${{ vars.SST_STATE_REPO }}
  SST_STATE_REPO_BRANCH: ${{ vars.SST_STATE_REPO_BRANCH }}
  SST_STATE_AGE_RECIPIENT: ${{ vars.SST_STATE_AGE_RECIPIENT }}

permissions:
  contents: read

jobs:
  workflow-security:
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Scan GitHub Actions security
        uses: zizmorcore/zizmor-action@5f14fd08f7cf1cb1609c1e344975f152c7ee938d # v0.5.6
        with:
          advanced-security: false
          annotations: true
          min-confidence: medium
          min-severity: medium
          version: v1.25.2

  verify-app:
    needs: workflow-security
    if: ${{ needs.workflow-security.result == 'success' }}
    concurrency:
      group: web-main-verify-app-${{ github.ref }}
      cancel-in-progress: true
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Vite+
        uses: ./.github/actions/setup-vite-plus

      - name: Verify app
        run: vp run verify

  e2e:
    needs: verify-app
    if: ${{ needs.verify-app.result == 'success' }}
    concurrency:
      group: web-main-e2e-${{ github.ref }}
      cancel-in-progress: true
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Vite+
        uses: ./.github/actions/setup-vite-plus

      - name: Install Playwright browser
        run: vp exec playwright install chromium

      - name: Build app
        run: vp run build

      - name: Run end-to-end tests
        run: vp run e2e

      - name: Upload Playwright artifacts
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-artifacts
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore

  deploy-app:
    needs: [workflow-security, verify-app, e2e]
    if: ${{ vars.SST_PRODUCTION_AUTO_DEPLOY_ENABLED == 'true' && needs.workflow-security.result == 'success' && needs.verify-app.result == 'success' && needs.e2e.result == 'success' }}
    concurrency:
      group: web-deploy-production
      cancel-in-progress: false
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://${{ vars.CHILL_PRODUCTION_DOMAIN }}
    permissions:
      contents: read
    env:
      WEB_DEPLOY_TARGET: app
      CLOUDFLARE_DEFAULT_ACCOUNT_ID: ${{ vars.CLOUDFLARE_DEFAULT_ACCOUNT_ID }}
      SST_STATE_FILE: ${{ vars.SST_STATE_FILE_PRODUCTION }}
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Vite+
        uses: ./.github/actions/setup-vite-plus
        with:
          cache: false

      - name: Build production bundle
        run: vp run build

      - name: Install age
        run: scripts/ci/install-age

      - name: Restore encrypted SST local state
        env:
          SST_STATE_AGE_IDENTITY: ${{ secrets.SST_STATE_AGE_IDENTITY }}
          SST_STATE_REPO_TOKEN: ${{ secrets.SST_STATE_REPO_TOKEN }}
        run: scripts/ci/sst-state-git restore

      - name: Deploy app production to SST
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: vp exec sst deploy --stage production --print-logs

      - name: Save encrypted SST local state
        env:
          SST_STATE_AGE_IDENTITY: ${{ secrets.SST_STATE_AGE_IDENTITY }}
          SST_STATE_REPO_TOKEN: ${{ secrets.SST_STATE_REPO_TOKEN }}
        run: scripts/ci/sst-state-git save

  deploy-redirects:
    needs: [workflow-security, deploy-app]
    if: ${{ always() && vars.SST_PRODUCTION_AUTO_DEPLOY_ENABLED == 'true' && needs.workflow-security.result == 'success' && needs.deploy-app.result == 'success' }}
    concurrency:
      group: web-deploy-production
      cancel-in-progress: false
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://${{ vars.BINGE_PRODUCTION_DOMAIN }}
    permissions:
      contents: read
    env:
      WEB_DEPLOY_TARGET: redirects
      CLOUDFLARE_DEFAULT_ACCOUNT_ID: ${{ vars.CLOUDFLARE_DEFAULT_ACCOUNT_ID }}
      SST_STATE_FILE: ${{ vars.SST_STATE_FILE_PRODUCTION }}
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Vite+
        uses: ./.github/actions/setup-vite-plus
        with:
          cache: false

      - name: Install age
        run: scripts/ci/install-age

      - name: Restore encrypted SST local state
        env:
          SST_STATE_AGE_IDENTITY: ${{ secrets.SST_STATE_AGE_IDENTITY }}
          SST_STATE_REPO_TOKEN: ${{ secrets.SST_STATE_REPO_TOKEN }}
        run: scripts/ci/sst-state-git restore

      - name: Deploy redirects to SST
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: vp exec sst deploy --stage production --print-logs

      - name: Save encrypted SST local state
        env:
          SST_STATE_AGE_IDENTITY: ${{ secrets.SST_STATE_AGE_IDENTITY }}
          SST_STATE_REPO_TOKEN: ${{ secrets.SST_STATE_REPO_TOKEN }}
        run: scripts/ci/sst-state-git save
