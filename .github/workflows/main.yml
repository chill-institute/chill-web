name: Main

on:
  push:
    branches:
      - main

env:
  BINGE_PRODUCTION_DOMAIN: ${{ vars.BINGE_PRODUCTION_DOMAIN }}
  BINGE_PRODUCTION_REDIRECT_DOMAIN: ${{ vars.BINGE_PRODUCTION_REDIRECT_DOMAIN }}
  CHILL_PRODUCTION_DOMAIN: ${{ vars.CHILL_PRODUCTION_DOMAIN }}
  CHILL_STAGING_DOMAIN: ${{ vars.CHILL_STAGING_DOMAIN }}
  SST_PRODUCTION_AUTO_DEPLOY_ENABLED: ${{ vars.SST_PRODUCTION_AUTO_DEPLOY_ENABLED }}
  SST_STATE_REPO: ${{ vars.SST_STATE_REPO }}
  SST_STATE_REPO_BRANCH: ${{ vars.SST_STATE_REPO_BRANCH }}
  SST_STATE_AGE_RECIPIENT: ${{ vars.SST_STATE_AGE_RECIPIENT }}
  VITE_PLUS_VERSION: "0.1.21"

permissions:
  contents: read

jobs:
  workflow-security:
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Scan GitHub Actions security
        uses: zizmorcore/zizmor-action@5f14fd08f7cf1cb1609c1e344975f152c7ee938d # v0.5.6
        with:
          advanced-security: false
          annotations: true
          min-confidence: medium
          min-severity: medium
          version: v1.25.2

  changes:
    runs-on: ubuntu-latest
    outputs:
      app: ${{ steps.filter.outputs.app }}
      deploy_app: ${{ steps.filter.outputs.deploy_app }}
      deploy_redirects: ${{ steps.filter.outputs.deploy_redirects }}
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Detect changed surfaces
        id: filter
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        with:
          filters: |
            app:
              - 'src/**'
              - 'e2e/**'
              - 'public/**'
              - 'index.html'
              - 'components.json'
              - 'playwright.config.ts'
              - '.node-version'
              - '.gitignore'
              - '.vite-hooks/**'
              - '.githooks/**'
              - '.github/actions/**'
              - 'knip.json'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'sst.config.ts'
              - 'tsconfig.json'
              - 'vite.config.ts'
            deploy_app:
              - 'src/**'
              - 'e2e/**'
              - 'public/**'
              - 'index.html'
              - 'components.json'
              - 'playwright.config.ts'
              - '!e2e/**'
              - '.node-version'
              - '.gitignore'
              - '.vite-hooks/**'
              - '.githooks/**'
              - 'knip.json'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'sst.config.ts'
              - 'tsconfig.json'
              - 'vite.config.ts'
            deploy_redirects:
              - '.github/workflows/deploy.yml'
              - '.github/workflows/main.yml'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'scripts/ci/**'
              - 'sst.config.ts'
      - name: Publish change summary
        env:
          APP_CHANGED: ${{ steps.filter.outputs.app }}
          APP_DEPLOY_CHANGED: ${{ steps.filter.outputs.deploy_app }}
          REDIRECTS_CHANGED: ${{ steps.filter.outputs.deploy_redirects }}
        run: |
          {
            echo "## Changed web surface"
            echo
            echo "- App: \`${APP_CHANGED}\`"
            echo "- App deploy: \`${APP_DEPLOY_CHANGED}\`"
            echo "- Legacy redirects deploy: \`${REDIRECTS_CHANGED}\`"
          } >> "${GITHUB_STEP_SUMMARY}"

  verify-app:
    needs: changes
    if: ${{ needs.changes.outputs.app == 'true' }}
    concurrency:
      group: web-main-verify-app-${{ github.ref }}
      cancel-in-progress: true
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Vite+
        uses: voidzero-dev/setup-vp@ca1c46663915d6c1042ae23bd39ab85718bfb0fa # v1.10.0
        with:
          version: ${{ env.VITE_PLUS_VERSION }}
          node-version-file: ".node-version"
          cache: true
          run-install: false

      - name: Load Vite+ environment
        run: vp env

      - name: Install dependencies
        run: vp install

      - name: Verify app
        run: vp run verify

      - name: Upload app build artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: app-dist
          path: dist
          if-no-files-found: error

  e2e:
    needs: verify-app
    if: ${{ needs.verify-app.result == 'success' }}
    concurrency:
      group: web-main-e2e-${{ github.ref }}
      cancel-in-progress: true
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Download app build artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: app-dist
          path: dist

      - name: Set up Vite+
        uses: voidzero-dev/setup-vp@ca1c46663915d6c1042ae23bd39ab85718bfb0fa # v1.10.0
        with:
          version: ${{ env.VITE_PLUS_VERSION }}
          node-version-file: ".node-version"
          cache: true
          run-install: false

      - name: Load Vite+ environment
        run: vp env

      - name: Install dependencies
        run: vp install

      - name: Install Playwright browser
        run: vp exec playwright install chromium

      - name: Run end-to-end tests
        run: vp run e2e

      - name: Upload Playwright artifacts
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-artifacts
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore

  deploy-app:
    needs: [workflow-security, changes, verify-app, e2e]
    if: ${{ vars.SST_PRODUCTION_AUTO_DEPLOY_ENABLED == 'true' && needs.changes.outputs.deploy_app == 'true' && needs.workflow-security.result == 'success' && needs.verify-app.result == 'success' && needs.e2e.result == 'success' }}
    concurrency:
      group: web-deploy-production
      cancel-in-progress: false
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://${{ vars.CHILL_PRODUCTION_DOMAIN }}
    permissions:
      contents: read
    env:
      WEB_DEPLOY_TARGET: app
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_DEFAULT_ACCOUNT_ID: ${{ vars.CLOUDFLARE_DEFAULT_ACCOUNT_ID }}
      SST_STATE_AGE_IDENTITY: ${{ secrets.SST_STATE_AGE_IDENTITY }}
      SST_STATE_FILE: ${{ vars.SST_STATE_FILE_PRODUCTION }}
      SST_STATE_REPO_TOKEN: ${{ secrets.SST_STATE_REPO_TOKEN }}
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Download app build artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: app-dist
          path: dist

      - name: Set up Vite+
        uses: voidzero-dev/setup-vp@ca1c46663915d6c1042ae23bd39ab85718bfb0fa # v1.10.0
        with:
          version: ${{ env.VITE_PLUS_VERSION }}
          node-version-file: ".node-version"
          cache: false
          run-install: false

      - name: Load Vite+ environment
        run: vp env

      - name: Install dependencies
        run: vp install

      - name: Install age
        run: |
          sudo apt-get update
          sudo apt-get install -y age

      - name: Restore encrypted SST local state
        run: scripts/ci/sst-state-git restore

      - name: Deploy app production to SST
        run: vp exec sst deploy --stage production --print-logs

      - name: Save encrypted SST local state
        run: scripts/ci/sst-state-git save

  deploy-redirects:
    needs: [workflow-security, changes, deploy-app]
    if: ${{ always() && vars.SST_PRODUCTION_AUTO_DEPLOY_ENABLED == 'true' && needs.changes.outputs.deploy_redirects == 'true' && needs.workflow-security.result == 'success' && (needs.deploy-app.result == 'success' || needs.deploy-app.result == 'skipped') }}
    concurrency:
      group: web-deploy-production
      cancel-in-progress: false
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://${{ vars.BINGE_PRODUCTION_DOMAIN }}
    permissions:
      contents: read
    env:
      WEB_DEPLOY_TARGET: redirects
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_DEFAULT_ACCOUNT_ID: ${{ vars.CLOUDFLARE_DEFAULT_ACCOUNT_ID }}
      SST_STATE_AGE_IDENTITY: ${{ secrets.SST_STATE_AGE_IDENTITY }}
      SST_STATE_FILE: ${{ vars.SST_STATE_FILE_PRODUCTION }}
      SST_STATE_REPO_TOKEN: ${{ secrets.SST_STATE_REPO_TOKEN }}
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Vite+
        uses: voidzero-dev/setup-vp@ca1c46663915d6c1042ae23bd39ab85718bfb0fa # v1.10.0
        with:
          version: ${{ env.VITE_PLUS_VERSION }}
          node-version-file: ".node-version"
          cache: false
          run-install: false

      - name: Load Vite+ environment
        run: vp env

      - name: Install dependencies
        run: vp install

      - name: Install age
        run: |
          sudo apt-get update
          sudo apt-get install -y age

      - name: Restore encrypted SST local state
        run: scripts/ci/sst-state-git restore

      - name: Deploy legacy redirects to SST
        run: vp exec sst deploy --stage production --print-logs

      - name: Save encrypted SST local state
        run: scripts/ci/sst-state-git save

  deploy-summary:
    needs: [changes, deploy-app, deploy-redirects]
    if: ${{ always() && (needs.deploy-app.result != 'skipped' || needs.deploy-redirects.result != 'skipped') }}
    runs-on: ubuntu-latest
    steps:
      - name: Publish summary
        env:
          APP_RESULT: ${{ needs.deploy-app.result }}
          REDIRECTS_RESULT: ${{ needs.deploy-redirects.result }}
        run: |
          app_url="${CHILL_PRODUCTION_DOMAIN}"
          binge_url="${BINGE_PRODUCTION_DOMAIN}"

          {
            echo "## Web deploy"
            echo
            echo "- Environment: \`production\`"
            if [ "${APP_RESULT}" = "success" ]; then
              echo "- App: [https://${app_url}](https://${app_url})"
            elif [ "${APP_RESULT}" = "skipped" ]; then
              echo "- App: skipped"
            else
              echo "- App: ${APP_RESULT}"
            fi
            if [ "${REDIRECTS_RESULT}" = "success" ]; then
              echo "- Legacy redirect: [https://${binge_url}](https://${binge_url}) -> [https://${app_url}](https://${app_url})"
            elif [ "${REDIRECTS_RESULT}" = "skipped" ]; then
              echo "- Legacy redirect: skipped"
            else
              echo "- Legacy redirect: ${REDIRECTS_RESULT}"
            fi
            echo "- Flow: \`push Main workflow\`"
          } >> "${GITHUB_STEP_SUMMARY}"
