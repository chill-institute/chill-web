name: Main

on:
  push:
    branches:
      - main

jobs:
  verify:
    concurrency:
      group: web-main-verify-${{ github.ref }}
      cancel-in-progress: true
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version-file: ".node-version"
          cache: true
          run-install: false

      - name: Install dependencies
        run: vp install

      - name: Run core verify checks
        run: vp run verify

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: dist
          if-no-files-found: error

  smoke:
    needs: verify
    concurrency:
      group: web-main-smoke-${{ github.ref }}
      cancel-in-progress: true
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: dist

      - name: Set up Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version-file: ".node-version"
          cache: true
          run-install: false

      - name: Install dependencies
        run: vp install

      - name: Install Playwright browser
        run: vp exec playwright install --with-deps chromium

      - name: Smoke tests
        run: vp run smoke

      - name: Upload Playwright artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts-smoke
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore

  e2e:
    needs: verify
    concurrency:
      group: web-main-e2e-${{ github.ref }}
      cancel-in-progress: true
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: dist

      - name: Set up Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version-file: ".node-version"
          cache: true
          run-install: false

      - name: Install dependencies
        run: vp install

      - name: Install Playwright browser
        run: vp exec playwright install --with-deps chromium

      - name: End-to-end tests
        run: vp run e2e

      - name: Upload Playwright artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts-e2e
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore

  deploy:
    needs: [verify, smoke, e2e]
    if: ${{ needs.verify.result == 'success' && needs.smoke.result == 'success' && needs.e2e.result == 'success' }}
    concurrency:
      group: web-deploy-production
      cancel-in-progress: false
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: dist

      - name: Set up Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version-file: ".node-version"
          cache: true
          run-install: false

      - name: Install dependencies
        run: vp install

      - name: Deploy production to Cloudflare Pages
        uses: ./.github/actions/cloudflare-pages-deploy
        with:
          api-token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          account-id: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          branch: main

      - name: Install Playwright browser
        run: vp exec playwright install --with-deps chromium

      - name: Run hosted smoke after deploy
        run: vp run smoke:hosted

      - name: Publish summary
        run: |
          {
            echo "## Web deploy"
            echo
            echo "- Environment: \`production\`"
            echo "- Project: \`web-8vr\`"
            echo "- URL: \`https://chill.institute\`"
            echo "- Flow: \`push Main workflow\`"
          } >> "${GITHUB_STEP_SUMMARY}"
