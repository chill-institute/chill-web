name: Main

on:
  push:
    branches:
      - main

env:
  BINGE_PRODUCTION_DOMAIN: ${{ vars.BINGE_PRODUCTION_DOMAIN || 'binge.institute' }}
  BINGE_PRODUCTION_REDIRECT_DOMAIN: ${{ vars.BINGE_PRODUCTION_REDIRECT_DOMAIN || 'www.binge.institute' }}
  CHILL_PRODUCTION_DOMAIN: ${{ vars.CHILL_PRODUCTION_DOMAIN || 'chill.institute' }}
  CHILL_PRODUCTION_REDIRECT_DOMAIN: ${{ vars.CHILL_PRODUCTION_REDIRECT_DOMAIN || 'www.chill.institute' }}
  CHILL_STAGING_DOMAIN: ${{ vars.CHILL_STAGING_DOMAIN || 'staging.chill.institute' }}
  SST_PRODUCTION_AUTO_DEPLOY_ENABLED: ${{ vars.SST_PRODUCTION_AUTO_DEPLOY_ENABLED || 'false' }}
  SST_STATE_REPO: ${{ vars.SST_STATE_REPO }}
  SST_STATE_REPO_BRANCH: ${{ vars.SST_STATE_REPO_BRANCH || 'main' }}
  SST_STATE_AGE_RECIPIENT: ${{ vars.SST_STATE_AGE_RECIPIENT }}
  VITE_PLUS_VERSION: "0.1.21"

permissions:
  contents: read

jobs:
  workflow-security:
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Scan GitHub Actions security
        uses: zizmorcore/zizmor-action@5f14fd08f7cf1cb1609c1e344975f152c7ee938d # v0.5.6
        with:
          advanced-security: false
          annotations: true
          min-confidence: medium
          min-severity: medium
          version: v1.25.2

  changes:
    runs-on: ubuntu-latest
    outputs:
      chill: ${{ steps.filter.outputs.chill }}
      deploy_chill: ${{ steps.filter.outputs.deploy_chill }}
      deploy_redirects: ${{ steps.filter.outputs.deploy_redirects }}
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Detect changed surfaces
        id: filter
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        with:
          filters: |
            chill:
              - 'src/**'
              - 'e2e/**'
              - 'public/**'
              - 'index.html'
              - 'components.json'
              - 'playwright.config.ts'
              - '.node-version'
              - '.gitignore'
              - '.vite-hooks/**'
              - '.githooks/**'
              - '.github/actions/**'
              - 'knip.json'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'sst.config.ts'
              - 'tsconfig.json'
              - 'vite.config.ts'
            deploy_chill:
              - 'src/**'
              - 'e2e/**'
              - 'public/**'
              - 'index.html'
              - 'components.json'
              - 'playwright.config.ts'
              - '!e2e/**'
              - '.node-version'
              - '.gitignore'
              - '.vite-hooks/**'
              - '.githooks/**'
              - 'knip.json'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'sst.config.ts'
              - 'tsconfig.json'
              - 'vite.config.ts'
            deploy_redirects:
              - '.github/workflows/deploy.yml'
              - '.github/workflows/main.yml'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'scripts/ci/**'
              - 'sst.config.ts'
      - name: Publish change summary
        env:
          CHILL_CHANGED: ${{ steps.filter.outputs.chill }}
          CHILL_DEPLOY_CHANGED: ${{ steps.filter.outputs.deploy_chill }}
          REDIRECTS_CHANGED: ${{ steps.filter.outputs.deploy_redirects }}
        run: |
          {
            echo "## Changed web surface"
            echo
            echo "- Chill: \`${CHILL_CHANGED}\`"
            echo "- Chill deploy: \`${CHILL_DEPLOY_CHANGED}\`"
            echo "- Binge redirects deploy: \`${REDIRECTS_CHANGED}\`"
          } >> "${GITHUB_STEP_SUMMARY}"

  verify-chill:
    needs: changes
    if: ${{ needs.changes.outputs.chill == 'true' }}
    concurrency:
      group: web-main-verify-chill-${{ github.ref }}
      cancel-in-progress: true
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Vite+
        uses: voidzero-dev/setup-vp@ca1c46663915d6c1042ae23bd39ab85718bfb0fa # v1.10.0
        with:
          version: ${{ env.VITE_PLUS_VERSION }}
          node-version-file: ".node-version"
          cache: true
          run-install: false

      - name: Load Vite+ environment
        run: vp env

      - name: Install dependencies
        run: vp install

      - name: Verify chill app
        run: vp run verify

      - name: Upload chill build artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: chill-dist
          path: dist
          if-no-files-found: error

  e2e-chill:
    needs: verify-chill
    if: ${{ needs.verify-chill.result == 'success' }}
    concurrency:
      group: web-main-e2e-chill-${{ github.ref }}
      cancel-in-progress: true
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Download chill build artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: chill-dist
          path: dist

      - name: Set up Vite+
        uses: voidzero-dev/setup-vp@ca1c46663915d6c1042ae23bd39ab85718bfb0fa # v1.10.0
        with:
          version: ${{ env.VITE_PLUS_VERSION }}
          node-version-file: ".node-version"
          cache: true
          run-install: false

      - name: Load Vite+ environment
        run: vp env

      - name: Install dependencies
        run: vp install

      - name: Install Playwright browser
        run: vp exec playwright install chromium

      - name: Run chill end-to-end tests
        run: vp run e2e

      - name: Upload chill Playwright artifacts
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-artifacts-chill
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore

  deploy-chill:
    needs: [workflow-security, changes, verify-chill, e2e-chill]
    if: ${{ vars.SST_PRODUCTION_AUTO_DEPLOY_ENABLED == 'true' && needs.changes.outputs.deploy_chill == 'true' && needs.workflow-security.result == 'success' && needs.verify-chill.result == 'success' && needs.e2e-chill.result == 'success' }}
    concurrency:
      group: web-deploy-production
      cancel-in-progress: false
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://${{ vars.CHILL_PRODUCTION_DOMAIN || 'chill.institute' }}
    permissions:
      contents: read
    env:
      SST_STATE_FILE: ${{ vars.SST_STATE_FILE_PRODUCTION || 'chill-web/production/sst-local-state.tar.gz.age' }}
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Download chill build artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: chill-dist
          path: dist

      - name: Set up Vite+
        uses: voidzero-dev/setup-vp@ca1c46663915d6c1042ae23bd39ab85718bfb0fa # v1.10.0
        with:
          version: ${{ env.VITE_PLUS_VERSION }}
          node-version-file: ".node-version"
          cache: false
          run-install: false

      - name: Load Vite+ environment
        run: vp env

      - name: Install dependencies
        run: vp install

      - name: Install age
        run: |
          sudo apt-get update
          sudo apt-get install -y age

      - name: Restore encrypted SST local state
        env:
          SST_STATE_AGE_IDENTITY: ${{ secrets.SST_STATE_AGE_IDENTITY }}
          SST_STATE_BOOTSTRAP: "true"
          SST_STATE_REPO_TOKEN: ${{ secrets.SST_STATE_REPO_TOKEN }}
        run: scripts/ci/sst-state-git restore

      - name: Refresh chill production SST state
        env:
          CHILL_WEB_APP: chill
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_DEFAULT_ACCOUNT_ID: ${{ vars.CLOUDFLARE_DEFAULT_ACCOUNT_ID }}
        run: vp exec sst refresh --stage production --print-logs

      - name: Deploy chill production to SST
        env:
          CHILL_WEB_APP: chill
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_DEFAULT_ACCOUNT_ID: ${{ vars.CLOUDFLARE_DEFAULT_ACCOUNT_ID }}
        run: vp exec sst deploy --stage production --print-logs

      - name: Save encrypted SST local state
        if: always()
        env:
          SST_STATE_AGE_IDENTITY: ${{ secrets.SST_STATE_AGE_IDENTITY }}
          SST_STATE_REPO_TOKEN: ${{ secrets.SST_STATE_REPO_TOKEN }}
        run: scripts/ci/sst-state-git save

  deploy-redirects:
    needs: [workflow-security, changes, deploy-chill]
    if: ${{ always() && vars.SST_PRODUCTION_AUTO_DEPLOY_ENABLED == 'true' && needs.changes.outputs.deploy_redirects == 'true' && needs.workflow-security.result == 'success' && (needs.deploy-chill.result == 'success' || needs.deploy-chill.result == 'skipped') }}
    concurrency:
      group: web-deploy-production
      cancel-in-progress: false
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://${{ vars.BINGE_PRODUCTION_DOMAIN || 'binge.institute' }}
    permissions:
      contents: read
    env:
      SST_STATE_FILE: ${{ vars.SST_STATE_FILE_PRODUCTION || 'chill-web/production/sst-local-state.tar.gz.age' }}
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Vite+
        uses: voidzero-dev/setup-vp@ca1c46663915d6c1042ae23bd39ab85718bfb0fa # v1.10.0
        with:
          version: ${{ env.VITE_PLUS_VERSION }}
          node-version-file: ".node-version"
          cache: false
          run-install: false

      - name: Load Vite+ environment
        run: vp env

      - name: Install dependencies
        run: vp install

      - name: Install age
        run: |
          sudo apt-get update
          sudo apt-get install -y age

      - name: Restore encrypted SST local state
        env:
          SST_STATE_AGE_IDENTITY: ${{ secrets.SST_STATE_AGE_IDENTITY }}
          SST_STATE_BOOTSTRAP: "true"
          SST_STATE_REPO_TOKEN: ${{ secrets.SST_STATE_REPO_TOKEN }}
        run: scripts/ci/sst-state-git restore

      - name: Refresh binge redirect SST state
        env:
          CHILL_WEB_APP: redirects
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_DEFAULT_ACCOUNT_ID: ${{ vars.CLOUDFLARE_DEFAULT_ACCOUNT_ID }}
        run: vp exec sst refresh --stage production --print-logs

      - name: Deploy binge redirects to SST
        env:
          CHILL_WEB_APP: redirects
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_DEFAULT_ACCOUNT_ID: ${{ vars.CLOUDFLARE_DEFAULT_ACCOUNT_ID }}
        run: vp exec sst deploy --stage production --print-logs

      - name: Save encrypted SST local state
        if: always()
        env:
          SST_STATE_AGE_IDENTITY: ${{ secrets.SST_STATE_AGE_IDENTITY }}
          SST_STATE_REPO_TOKEN: ${{ secrets.SST_STATE_REPO_TOKEN }}
        run: scripts/ci/sst-state-git save

  deploy-summary:
    needs: [changes, deploy-chill, deploy-redirects]
    if: ${{ always() && (needs.deploy-chill.result != 'skipped' || needs.deploy-redirects.result != 'skipped') }}
    runs-on: ubuntu-latest
    steps:
      - name: Publish summary
        env:
          CHILL_RESULT: ${{ needs.deploy-chill.result }}
          REDIRECTS_RESULT: ${{ needs.deploy-redirects.result }}
        run: |
          chill_url="${CHILL_PRODUCTION_DOMAIN}"
          binge_url="${BINGE_PRODUCTION_DOMAIN}"

          {
            echo "## Web deploy"
            echo
            echo "- Environment: \`production\`"
            if [ "${CHILL_RESULT}" = "success" ]; then
              echo "- Chill: [https://${chill_url}](https://${chill_url})"
            elif [ "${CHILL_RESULT}" = "skipped" ]; then
              echo "- Chill: skipped"
            else
              echo "- Chill: ${CHILL_RESULT}"
            fi
            if [ "${REDIRECTS_RESULT}" = "success" ]; then
              echo "- Binge redirect: [https://${binge_url}](https://${binge_url}) -> [https://${chill_url}](https://${chill_url})"
            elif [ "${REDIRECTS_RESULT}" = "skipped" ]; then
              echo "- Binge redirect: skipped"
            else
              echo "- Binge redirect: ${REDIRECTS_RESULT}"
            fi
            echo "- Flow: \`push Main workflow\`"
          } >> "${GITHUB_STEP_SUMMARY}"
