name: Deploy App

on:
  workflow_call:
    inputs:
      environment-name:
        description: GitHub Environment name and SST stage to deploy through.
        required: true
        type: string
      environment-url:
        description: Deployment URL for the GitHub Environment.
        required: true
        type: string
      ref:
        description: Git ref to deploy.
        required: true
        type: string
      sst-state-file:
        description: Encrypted SST state file for this environment.
        required: true
        type: string
    secrets:
      CLOUDFLARE_API_TOKEN:
        required: true
      SST_STATE_AGE_IDENTITY:
        required: true
      SST_STATE_REPO_TOKEN:
        required: true
      SENTRY_AUTH_TOKEN:
        required: true

permissions:
  contents: read

jobs:
  deploy-app:
    runs-on: blacksmith-2vcpu-ubuntu-2404
    environment:
      name: ${{ inputs.environment-name }}
      url: ${{ inputs.environment-url }}
    env:
      BINGE_PRODUCTION_DOMAIN: ${{ vars.BINGE_PRODUCTION_DOMAIN }}
      BINGE_PRODUCTION_REDIRECT_DOMAIN: ${{ vars.BINGE_PRODUCTION_REDIRECT_DOMAIN }}
      CHILL_PRODUCTION_DOMAIN: ${{ vars.CHILL_PRODUCTION_DOMAIN }}
      CHILL_STAGING_DOMAIN: ${{ vars.CHILL_STAGING_DOMAIN }}
      WEB_DEPLOY_TARGET: app
      CLOUDFLARE_DEFAULT_ACCOUNT_ID: ${{ vars.CLOUDFLARE_DEFAULT_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      SST_STATE_REPO: ${{ vars.SST_STATE_REPO }}
      SST_STATE_FILE: ${{ inputs.sst-state-file }}
      SST_STATE_AGE_RECIPIENT: ${{ vars.SST_STATE_AGE_RECIPIENT }}
      SST_STATE_AGE_IDENTITY: ${{ secrets.SST_STATE_AGE_IDENTITY }}
      SST_STATE_REPO_TOKEN: ${{ secrets.SST_STATE_REPO_TOKEN }}
      SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
      SENTRY_ORG: ${{ vars.SENTRY_ORG }}
      SENTRY_PROJECT: ${{ vars.SENTRY_PROJECT }}
      VITE_PUBLIC_SENTRY_DSN: ${{ vars.VITE_PUBLIC_SENTRY_DSN }}
      VITE_PUBLIC_SENTRY_ENVIRONMENT: ${{ inputs.environment-name }}
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.ref }}

      - name: Build and deploy app
        uses: ./.github/actions/build-and-deploy-app
        with:
          environment-name: ${{ inputs.environment-name }}
