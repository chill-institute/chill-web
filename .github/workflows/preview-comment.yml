name: Preview Comment

on:
  workflow_run:
    workflows: [Verify]
    types: [completed]

jobs:
  comment:
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'pull_request' }}
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      issues: write
      pull-requests: write
    steps:
      - name: Find preview metadata artifact
        id: artifact
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const run_id = context.payload.workflow_run.id;

            const artifacts = await github.paginate(github.rest.actions.listWorkflowRunArtifacts, {
              owner,
              repo,
              run_id,
              per_page: 100,
            });

            const artifact = artifacts.find((entry) => entry.name === 'preview-deployment');
            core.setOutput('present', artifact ? '1' : '0');
            core.setOutput('artifact-id', artifact ? String(artifact.id) : '');

      - name: Download preview metadata
        if: ${{ steps.artifact.outputs.present == '1' }}
        uses: actions/download-artifact@v4
        with:
          artifact-ids: ${{ steps.artifact.outputs.artifact-id }}
          github-token: ${{ github.token }}
          repository: ${{ github.repository }}
          run-id: ${{ github.event.workflow_run.id }}
          path: preview-deployment

      - name: Upsert preview comment
        if: ${{ steps.artifact.outputs.present == '1' }}
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('node:fs');
            const payload = JSON.parse(fs.readFileSync('preview-deployment/preview-deployment.json', 'utf8'));
            const marker = '<!-- chill-web-preview -->';
            const body = [
              marker,
              'Preview deploy ready',
              '',
              `- URL: ${payload.url}`,
              `- Branch: ${payload.branch}`,
              `- Commit: ${String(payload.sha).slice(0, 7)}`,
            ].join('\n');

            const { owner, repo } = context.repo;
            const issue_number = payload.pr_number;

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            });

            const existing = comments.find((comment) =>
              comment.user?.type === 'Bot' && comment.body?.includes(marker),
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
              return;
            }

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number,
              body,
            });
