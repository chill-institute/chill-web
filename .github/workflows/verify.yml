name: verify

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up mise
        uses: jdx/mise-action@v3

      - name: Install Playwright browser
        run: bunx playwright install --with-deps chromium

      - name: Verify
        run: mise run verify
