name: Verify

on:
  pull_request:

env:
  VITE_PLUS_VERSION: "0.1.21"

permissions:
  contents: read

concurrency:
  group: web-verify-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  workflow-security:
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Scan GitHub Actions security
        uses: zizmorcore/zizmor-action@5f14fd08f7cf1cb1609c1e344975f152c7ee938d # v0.5.6
        with:
          advanced-security: false
          annotations: true
          min-confidence: medium
          min-severity: medium
          version: v1.25.2

  changes:
    runs-on: ubuntu-latest
    outputs:
      chill: ${{ steps.filter.outputs.chill }}
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Detect changed surfaces
        id: filter
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        with:
          filters: |
            chill:
              - 'src/**'
              - 'e2e/**'
              - 'public/**'
              - 'index.html'
              - 'components.json'
              - 'playwright.config.ts'
              - '.node-version'
              - '.gitignore'
              - '.vite-hooks/**'
              - '.githooks/**'
              - '.github/actions/**'
              - 'knip.json'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'sst.config.ts'
              - 'tsconfig.json'
              - 'vite.config.ts'
      - name: Publish change summary
        env:
          CHILL_CHANGED: ${{ steps.filter.outputs.chill }}
        run: |
          {
            echo "## Changed web surface"
            echo
            echo "- Chill: \`${CHILL_CHANGED}\`"
          } >> "${GITHUB_STEP_SUMMARY}"

  verify-chill:
    needs: changes
    if: ${{ needs.changes.outputs.chill == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Vite+
        uses: voidzero-dev/setup-vp@ca1c46663915d6c1042ae23bd39ab85718bfb0fa # v1.10.0
        with:
          version: ${{ env.VITE_PLUS_VERSION }}
          node-version-file: ".node-version"
          cache: true
          run-install: false

      - name: Load Vite+ environment
        run: vp env

      - name: Install dependencies
        run: vp install

      - name: Verify chill app
        run: vp run verify

      - name: Upload chill build artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: chill-dist
          path: dist
          if-no-files-found: error

  e2e-chill:
    needs: verify-chill
    if: ${{ github.actor != 'dependabot[bot]' && needs.verify-chill.result == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Download chill build artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: chill-dist
          path: dist

      - name: Set up Vite+
        uses: voidzero-dev/setup-vp@ca1c46663915d6c1042ae23bd39ab85718bfb0fa # v1.10.0
        with:
          version: ${{ env.VITE_PLUS_VERSION }}
          node-version-file: ".node-version"
          cache: true
          run-install: false

      - name: Load Vite+ environment
        run: vp env

      - name: Install dependencies
        run: vp install

      - name: Install Playwright browser
        run: vp exec playwright install chromium

      - name: Run chill end-to-end tests
        run: vp run e2e

      - name: Upload chill Playwright artifacts
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-artifacts-chill
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore
