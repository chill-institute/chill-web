name: Verify

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  merge_group:

permissions:
  contents: read

concurrency:
  group: web-verify-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  workflow-security:
    uses: ./.github/workflows/_workflow-security.yml
    permissions:
      actions: read
      contents: read

  verify-app:
    uses: ./.github/workflows/_verify-app.yml

  e2e:
    needs: verify-app
    if: ${{ github.actor != 'dependabot[bot]' && needs.verify-app.result == 'success' }}
    uses: ./.github/workflows/_e2e.yml

  verify-result:
    runs-on: ubuntu-latest
    needs: [workflow-security, verify-app, e2e]
    if: ${{ always() }}
    steps:
      - name: Check required jobs
        env:
          WORKFLOW_SECURITY_RESULT: ${{ needs.workflow-security.result }}
          VERIFY_APP_RESULT: ${{ needs.verify-app.result }}
          E2E_RESULT: ${{ needs.e2e.result }}
        run: |
          set -euo pipefail

          if [ "${WORKFLOW_SECURITY_RESULT}" != "success" ]; then
            echo "workflow-security result: ${WORKFLOW_SECURITY_RESULT}" >&2
            exit 1
          fi

          if [ "${VERIFY_APP_RESULT}" != "success" ]; then
            echo "verify-app result: ${VERIFY_APP_RESULT}" >&2
            exit 1
          fi

          case "${E2E_RESULT}" in
            success|skipped)
              ;;
            *)
              echo "e2e result: ${E2E_RESULT}" >&2
              exit 1
              ;;
          esac
