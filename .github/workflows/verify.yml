name: Verify

on:
  pull_request:

env:
  VITE_PLUS_VERSION: "0.1.21"

permissions:
  contents: read

concurrency:
  group: web-verify-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  workflow-security:
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Scan GitHub Actions security
        uses: zizmorcore/zizmor-action@5f14fd08f7cf1cb1609c1e344975f152c7ee938d # v0.5.6
        with:
          advanced-security: false
          annotations: true
          min-confidence: medium
          min-severity: medium
          version: v1.25.2

  verify-app:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Vite+
        uses: voidzero-dev/setup-vp@ca1c46663915d6c1042ae23bd39ab85718bfb0fa # v1.10.0
        with:
          version: ${{ env.VITE_PLUS_VERSION }}
          node-version-file: ".node-version"
          cache: true
          run-install: false

      - name: Load Vite+ environment
        run: vp env

      - name: Install dependencies
        run: vp install

      - name: Verify app
        run: vp run verify

      - name: Upload app build artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: app-dist
          path: dist
          if-no-files-found: error

  e2e:
    needs: verify-app
    if: ${{ github.actor != 'dependabot[bot]' && needs.verify-app.result == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Download app build artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: app-dist
          path: dist

      - name: Set up Vite+
        uses: voidzero-dev/setup-vp@ca1c46663915d6c1042ae23bd39ab85718bfb0fa # v1.10.0
        with:
          version: ${{ env.VITE_PLUS_VERSION }}
          node-version-file: ".node-version"
          cache: true
          run-install: false

      - name: Load Vite+ environment
        run: vp env

      - name: Install dependencies
        run: vp install

      - name: Install Playwright browser
        run: vp exec playwright install chromium

      - name: Run end-to-end tests
        run: vp run e2e

      - name: Upload Playwright artifacts
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-artifacts
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore

  a11y:
    needs: verify-app
    if: ${{ github.actor != 'dependabot[bot]' && needs.verify-app.result == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Download app build artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: app-dist
          path: dist

      - name: Set up Vite+
        uses: voidzero-dev/setup-vp@ca1c46663915d6c1042ae23bd39ab85718bfb0fa # v1.10.0
        with:
          version: ${{ env.VITE_PLUS_VERSION }}
          node-version-file: ".node-version"
          cache: true
          run-install: false

      - name: Load Vite+ environment
        run: vp env

      - name: Install dependencies
        run: vp install

      - name: Install Playwright browser
        run: vp exec playwright install chromium

      - name: Run accessibility audit
        run: vp run a11y

      - name: Upload accessibility artifacts
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-a11y-artifacts
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore

  perf:
    needs: verify-app
    if: ${{ github.actor != 'dependabot[bot]' && needs.verify-app.result == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Download app build artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: app-dist
          path: dist

      - name: Set up Vite+
        uses: voidzero-dev/setup-vp@ca1c46663915d6c1042ae23bd39ab85718bfb0fa # v1.10.0
        with:
          version: ${{ env.VITE_PLUS_VERSION }}
          node-version-file: ".node-version"
          cache: true
          run-install: false

      - name: Load Vite+ environment
        run: vp env

      - name: Install dependencies
        run: vp install

      - name: Install Playwright browser
        run: vp exec playwright install chromium

      - name: Run performance budget checks
        run: vp run perf

      - name: Upload performance artifacts
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-perf-artifacts
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore
