name: Verify

on:
  pull_request:

concurrency:
  group: web-verify-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version-file: ".node-version"
          cache: true
          run-install: false

      - name: Install dependencies
        run: vp install

      - name: Run core verify checks
        run: vp run verify

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: dist
          if-no-files-found: error

  e2e:
    needs: verify
    if: ${{ github.actor != 'dependabot[bot]' }}
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: dist

      - name: Set up Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version-file: ".node-version"
          cache: true
          run-install: false

      - name: Install dependencies
        run: vp install

      - name: Install Playwright browser
        run: vp exec playwright install --with-deps chromium

      - name: End-to-end tests
        run: vp run e2e

      - name: Upload Playwright artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts-e2e
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore

  deploy-preview:
    needs: [verify, e2e]
    if: ${{ github.actor != 'dependabot[bot]' && github.event.pull_request.head.repo.full_name == github.repository }}
    concurrency:
      group: web-preview-pr-${{ github.event.pull_request.number }}
      cancel-in-progress: true
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: dist

      - name: Set up Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version-file: ".node-version"
          cache: true
          run-install: false

      - name: Deploy preview to Cloudflare Pages
        id: deploy_preview
        uses: ./.github/actions/cloudflare-pages-deploy
        with:
          api-token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          account-id: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          branch: ${{ github.head_ref }}

      - name: Upsert preview comment
        uses: actions/github-script@v7
        env:
          PREVIEW_URL: ${{ steps.deploy_preview.outputs.pages-deployment-alias-url || steps.deploy_preview.outputs.deployment-url }}
          PREVIEW_BRANCH: ${{ github.head_ref }}
          PREVIEW_SHA: ${{ github.sha }}
        with:
          script: |
            const marker = '<!-- chill-web-preview -->';
            const body = [
              marker,
              'Preview deploy ready',
              '',
              `- URL: ${process.env.PREVIEW_URL}`,
              `- Branch: ${process.env.PREVIEW_BRANCH}`,
              `- Commit: ${process.env.PREVIEW_SHA.slice(0, 7)}`,
            ].join('\n');

            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            });

            const existing = comments.find((comment) =>
              comment.user?.type === 'Bot' && comment.body?.includes(marker),
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
              return;
            }

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number,
              body,
            });

      - name: Publish summary
        env:
          PREVIEW_URL: ${{ steps.deploy_preview.outputs.pages-deployment-alias-url || steps.deploy_preview.outputs.deployment-url }}
          PREVIEW_BRANCH: ${{ github.head_ref }}
        run: |
          {
            echo "## Web preview deploy"
            echo
            echo "- Project: \`web-8vr\`"
            echo "- Branch: \`${PREVIEW_BRANCH}\`"
            echo "- URL: \`${PREVIEW_URL}\`"
          } >> "${GITHUB_STEP_SUMMARY}"
